<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>BM20 Index Factsheet</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5"></script>

  <style>
    :root{
      --bg:#f8fafc; --panel:#ffffff; --border:#e5e7eb; --text:#0f172a; --muted:#64748b;
      --shadow:0 1px 2px rgba(15,23,42,.06); --radius:14px;
      --accent:#2563eb; --accent-2:#7c3aed;
      --sidebar:#0b1220; --sidebarText:#e2e8f0; --sidebarMuted:#94a3b8;
      --chip:#f1f5f9; --up:#16a34a; --down:#dc2626;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; background:var(--bg); color:var(--text); font-family: system-ui, -apple-system, sans-serif; }
    .app{ display:grid; grid-template-columns: 260px 1fr; min-height:100vh; }
    @media (max-width: 980px){ .app{ grid-template-columns: 1fr; } }
    .sidebar{ background:var(--sidebar); padding:18px 14px; position:sticky; top:0; height:100vh; overflow:auto; border-right:1px solid rgba(255,255,255,.06); }
    @media (max-width: 980px){ .sidebar{ position:relative; height:auto; } }
    .brand{ display:flex; align-items:center; gap:10px; padding:10px 10px 14px; border-bottom:1px solid rgba(255,255,255,.08); margin-bottom:14px; }
    .logo{ width:32px; height:32px; border-radius:10px; background:linear-gradient(135deg, var(--accent), var(--accent-2)); }
    .brand h1{ margin:0; font-size:14px; color:var(--sidebarText); }
    .nav a{ display:flex; align-items:center; justify-content:space-between; padding:10px; border-radius:10px; color:var(--sidebarText); text-decoration:none; font-size:13px; }
    .nav a:hover{ background:rgba(255,255,255,.06); }
    .tag{ font-size:11px; color:var(--sidebarMuted); background:rgba(255,255,255,.06); padding:2px 8px; border-radius:999px; }
    .main{ padding:18px 18px 34px; }
    .topbar{ display:flex; align-items:flex-end; justify-content:space-between; gap:14px; flex-wrap:wrap; margin-bottom:14px; }
    .panel{ background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:12px; }
    .kpiGrid{ display:grid; gap:12px; margin-bottom:14px; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
    .kpi{ padding:12px; }
    .kpi .label{ color:var(--muted); font-size:12px; margin:0; }
    .kpi .value{ font-size:20px; font-weight:900; margin:4px 0; }
    .widgets{ display:grid; grid-template-columns: 1fr; gap:12px; }
    @media (min-width: 1100px){ .widgets{ grid-template-columns: 1fr 1fr; } }
    .widget{ padding:12px; }
    .chart{ width:100%; height:360px; }
    .btn{ border:1px solid var(--border); background:#fff; padding:6px 10px; border-radius:999px; font-size:12px; cursor:pointer; }
    .btn.active{ border-color:#0f172a; font-weight:900; }
    .pill{ font-size:11px; background:var(--chip); padding:3px 8px; border-radius:999px; display:inline-flex; align-items:center; gap:6px; }
    .delta.up{ color:var(--up); } .delta.down{ color:var(--down); }
    .chips{ display:flex; flex-wrap:wrap; gap:8px; padding:12px; }
    .chipSym{ background:var(--chip); border:1px solid var(--border); border-radius:999px; padding:6px 10px; font-size:12px; }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo"></div><div><h1>BM20 Index</h1></div></div>
    <nav class="nav">
      <a href="#sec-overview">Overview <span class="tag">KPI</span></a>
      <a href="#sec-series">Index Series <span class="tag">LINE</span></a>
      <a href="#sec-comparison">Correlation <span class="tag">NASDAQ</span></a>
      <a href="#sec-universe">Universe <span class="tag">20</span></a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="title"><h2>BM20 Index Dashboard</h2></div>
      <div class="meta">
        <span class="chip" id="metaAsOf">ASOF: -</span>
        <span class="chip" id="metaDelta">1D: -</span>
      </div>
    </div>

    <section id="sec-overview" class="kpiGrid">
      <div class="panel kpi"><p class="label">지수 레벨</p><p class="value" id="kpiLevel">-</p><div class="note" id="kpiLevelNote">-</div></div>
      <div class="panel kpi"><p class="label">1D</p><p class="value" id="kpi1d">-</p><div class="note" id="kpiBreadth">-</div></div>
      <div class="panel kpi"><p class="label">7D</p><p class="value" id="kpi7d">-</p></div>
      <div class="panel kpi"><p class="label">30D</p><p class="value" id="kpi30d">-</p></div>
      <div class="panel kpi"><p class="label">Kimchi Premium</p><p class="value" id="kimchiValue">-</p></div>
    </section>

    <section class="section" id="sec-series">
      <div class="sectionHead">
        <h3>Index Series</h3>
        <div class="toolbar">
          <button class="btn active" id="btn1y">1Y</button>
          <button class="btn" id="btnytd">YTD</button>
          <button class="btn" id="btnall">ALL</button>
          <span class="pill" id="seriesStatus">-</span>
        </div>
      </div>
      <div class="panel"><div id="seriesChart" class="chart"></div></div>
    </section>

    <section class="section" id="sec-comparison">
      <div class="sectionHead"><h3>Market Correlation (vs NASDAQ)</h3></div>
      <div class="widgets">
        <div class="panel widget"><h4>BTC vs NASDAQ</h4><div id="btcNasdaqChart" class="chart"></div></div>
        <div class="panel widget"><h4>BM20 vs NASDAQ</h4><div id="bm20NasdaqChart" class="chart"></div></div>
      </div>
    </section>

    <section class="section" id="sec-movers">
      <div class="sectionHead"><h3>Top Movers & Heatmap</h3></div>
      <div class="panel widget"><div id="moverBar" class="chart"></div></div>
      <div class="panel widget"><div id="perfBar" class="chart" style="height:200px;"></div></div>
    </section>

    <section class="section" id="sec-universe">
      <div class="sectionHead"><h3>Current Universe</h3></div>
      <div class="panel"><div class="chips" id="uniList"></div></div>
    </section>
  </main>
</div>

<script>
  let seriesChart, perfChart, moverChart, btcNasdaqChart, bm20NasdaqChart;
  let SERIES = [], BTC_SERIES = [], NASDAQ_SERIES = [];

  const fmtNum = (v, d=2) => Number.isFinite(v) ? v.toLocaleString(undefined,{maximumFractionDigits:d}) : "-";
  const fmtPctRatio = (v, d=2) => {
    const n = Number(v); if(!Number.isFinite(n)) return "-";
    return (n > 0 ? "+" : "") + (n * 100).toFixed(d) + "%";
  };

  async function fetchAnyJson(urls){
    for (const u of urls){
      try {
        const r = await fetch(u + "?v=" + Date.now());
        if (r.ok) return { json: await r.json() };
      } catch(e){}
    }
    throw new Error("Data not found");
  }

  function initCharts(){
    seriesChart = echarts.init(qs("#seriesChart"));
    perfChart = echarts.init(qs("#perfBar"));
    moverChart = echarts.init(qs("#moverBar"));
    btcNasdaqChart = echarts.init(qs("#btcNasdaqChart"));
    bm20NasdaqChart = echarts.init(qs("#bm20NasdaqChart"));
  }

  async function loadSeries(){
    const { json } = await fetchAnyJson(["bm20_series.json"]);
    SERIES = (Array.isArray(json) ? json : json.series).map(d => ({ date: d.date, v: d.level, t: new Date(d.date) }));
    
    try {
      const btc = await fetchAnyJson(["btc_usd_series.json"]);
      BTC_SERIES = btc.json.map(d => ({ date: d.date, v: d.price }));
    } catch(e) {}
  }

  async function loadNasdaqData() {
    try {
      const { json } = await fetchAnyJson(["nasdaq_series.json"]);
      NASDAQ_SERIES = json.map(d => ({ date: d.date, v: d.price }));
    } catch (e) { console.warn("NASDAQ data missing"); }
  }

  function renderSeries(mode){
    const now = new Date();
    let filtered = SERIES;
    if(mode === "1Y") filtered = SERIES.filter(d => d.t > new Date(now.setFullYear(now.getFullYear()-1)));
    
    const dates = filtered.map(d => d.date);
    const btcMap = new Map(BTC_SERIES.map(d => [d.date, d.v]));
    
    seriesChart.setOption({
      tooltip: { trigger: 'axis' },
      xAxis: { type: 'category', data: dates },
      yAxis: [{ type: 'value', name: 'BM20' }, { type: 'value', name: 'BTC', position: 'right' }],
      series: [
        { name: 'BM20', type: 'line', data: filtered.map(d => d.v), smooth: true, showSymbol: false },
        { name: 'BTC', type: 'line', data: dates.map(d => btcMap.get(d)), yAxisIndex: 1, smooth: true, showSymbol: false }
      ]
    });
  }

  function renderComparisonCharts() {
    if (!NASDAQ_SERIES.length) return;
    const dates = SERIES.map(d => d.date);
    const nasdaqMap = new Map(NASDAQ_SERIES.map(d => [d.date, d.v]));
    const btcMap = new Map(BTC_SERIES.map(d => [d.date, d.v]));

    const common = {
      tooltip: { trigger: 'axis' },
      xAxis: { type: 'category', data: dates },
      dataZoom: [{ type: 'inside', start: 70 }]
    };

    btcNasdaqChart.setOption({
      ...common,
      yAxis: [{ type: 'value', name: 'BTC' }, { type: 'value', name: 'NASDAQ', position: 'right' }],
      series: [
        { name: 'BTC', type: 'line', data: dates.map(d => btcMap.get(d)), showSymbol: false },
        { name: 'NASDAQ', type: 'line', data: dates.map(d => nasdaqMap.get(d)), yAxisIndex: 1, showSymbol: false }
      ]
    });

    bm20NasdaqChart.setOption({
      ...common,
      yAxis: [{ type: 'value', name: 'BM20' }, { type: 'value', name: 'NASDAQ', position: 'right' }],
      series: [
        { name: 'BM20', type: 'line', data: SERIES.map(d => d.v), showSymbol: false },
        { name: 'NASDAQ', type: 'line', data: dates.map(d => nasdaqMap.get(d)), yAxisIndex: 1, showSymbol: false }
      ]
    });
  }

  async function loadLatest(){
    const { json: j } = await fetchAnyJson(["bm20_latest.json"]);
    qs("#kpiLevel").textContent = fmtNum(j.bm20Level);
    qs("#kpi1d").innerHTML = `<span class="delta ${j.bm20ChangePct>=0?'up':'down'}">${fmtPctRatio(j.bm20ChangePct)}</span>`;
    qs("#kimchiValue").textContent = (j.kimchi_pct || j.kimchi_premium_pct || 0).toFixed(2) + "%";
    qs("#metaAsOf").textContent = "ASOF: " + j.asOf;

    const uniList = qs("#uniList");
    if(j.components) {
      uniList.innerHTML = j.components.map(c => `<div class="chipSym"><b>${c.symbol}</b> <span>${(c.weight*100).toFixed(2)}%</span></div>`).join("");
    }
  }

  const qs = s => document.querySelector(s);

  async function main(){
    initCharts();
    await loadSeries();
    await loadNasdaqData();
    await loadLatest();
    
    renderSeries("1Y");
    renderComparisonCharts();

    qs("#btn1y").onclick = () => renderSeries("1Y");
    qs("#btnytd").onclick = () => renderSeries("YTD");
    qs("#btnall").onclick = () => renderSeries("ALL");

    window.onresize = () => [seriesChart, perfChart, moverChart, btcNasdaqChart, bm20NasdaqChart].forEach(c => c?.resize());
  }

  main().catch(console.error);
</script>
</body>
</html>
