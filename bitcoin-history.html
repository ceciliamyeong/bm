<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비트코인 역사와 가격 추이 | 블록미디어</title>
<meta name="description" content="2009년 제네시스 블록부터 현재까지, 비트코인의 주요 사건과 가격 흐름을 한눈에">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f7f7f5;
    --bg3: #f0efec;
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #9a9894;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --accent: #0f6e56;
    --accent-light: rgba(15,110,86,0.10);
    --up: #3B6D11;
    --up-bg: #EAF3DE;
    --down: #A32D2D;
    --down-bg: #FCEBEB;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --bg2: #1a1a18;
      --bg3: #222220;
      --text: #e8e7e3;
      --text2: #888780;
      --text3: #555450;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --accent: #1D9E75;
      --accent-light: rgba(29,158,117,0.12);
      --up: #9FE1CB;
      --up-bg: #0a2e20;
      --down: #F7C1C1;
      --down-bg: #2e0a0a;
    }
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  .site-header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .site-logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    text-decoration: none;
    letter-spacing: -0.02em;
  }

  .site-logo span { color: var(--accent); }

  .header-sep { width: 1px; height: 16px; background: var(--border2); }

  .header-breadcrumb {
    font-size: 12px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── LAYOUT ── */
  .container {
    max-width: 1060px;
    margin: 0 auto;
    padding: 0 2rem;
  }

  /* ── PAGE HERO ── */
  .page-hero {
    padding: 2.5rem 0 2rem;
    border-bottom: 2px solid var(--text);
    margin-bottom: 2rem;
  }

  .page-hero-eyebrow {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.6rem;
  }

  .page-hero h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.2;
  }

  .page-hero p {
    margin-top: 0.5rem;
    font-size: 13px;
    color: var(--text2);
  }

  /* ── PRICE STRIP ── */
  .price-strip {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    margin-bottom: 1.25rem;
    overflow: hidden;
  }

  .price-cell {
    padding: 0.9rem 1.4rem;
    border-right: 0.5px solid var(--border);
    min-width: 0;
  }

  .price-cell:last-child { border-right: none; flex: 1; }

  .price-cell-label {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 4px;
  }

  .price-cell-value {
    font-size: 20px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -0.02em;
    white-space: nowrap;
  }

  .price-cell-value.sm { font-size: 14px; }

  .badge-change {
    display: inline-block;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 4px;
    margin-top: 4px;
  }

  .badge-change.up { background: var(--up-bg); color: var(--up); }
  .badge-change.down { background: var(--down-bg); color: var(--down); }

  /* ── CHART CONTROLS ── */
  .chart-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .ctrl-sep { width: 1px; height: 18px; background: var(--border2); margin: 0 2px; }

  .btn-ctrl {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    padding: 4px 11px;
    border-radius: 4px;
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
  }

  .btn-ctrl:hover { background: var(--bg3); color: var(--text); }

  .btn-ctrl.active-period {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .btn-ctrl.active-type {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .btn-ctrl.markers-on {
    background: #FAEEDA;
    color: #854F0B;
    border-color: #EF9F27;
  }

  @media (prefers-color-scheme: dark) {
    .btn-ctrl.markers-on { background: #412402; color: #FAC775; border-color: #BA7517; }
  }

  /* ── CHART WRAP ── */
  .chart-wrap {
    position: relative;
    height: 380px;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg);
    margin-bottom: 0.5rem;
  }

  #lwChart { width: 100%; height: 100%; }

  .chart-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text3);
    background: var(--bg);
    z-index: 10;
  }

  /* ── EVENT TOOLTIP (chart overlay) ── */
  .ohlc-bar {
    position: absolute;
    top: 10px;
    left: 12px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text2);
    z-index: 20;
    pointer-events: none;
    line-height: 1.9;
  }

  .event-popup {
    position: absolute;
    bottom: 12px;
    left: 12px;
    right: 12px;
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
    z-index: 30;
    display: none;
    max-width: 420px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }

  .event-popup-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 3px;
  }

  .event-popup-title {
    font-weight: 700;
    font-size: 13px;
    margin-bottom: 4px;
    line-height: 1.4;
  }

  .event-popup-desc {
    color: var(--text2);
    line-height: 1.6;
    font-size: 12px;
  }

  .event-popup-close {
    position: absolute;
    top: 8px; right: 10px;
    font-size: 16px;
    color: var(--text3);
    cursor: pointer;
    line-height: 1;
    border: none;
    background: none;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
    padding-bottom: 0.5rem;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 2rem;
    margin-top: 2.5rem;
  }

  /* ── TIMELINE ── */
  .year-anchor { scroll-margin-top: 64px; }

  .year-block { margin-bottom: 3rem; }

  .year-heading {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
    padding: 5px 12px;
    background: var(--text);
    color: var(--bg);
    border-radius: 3px;
    margin-bottom: 1rem;
  }

  .event-list { display: flex; flex-direction: column; }

  .event-item {
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 0 1.25rem;
    padding: 1rem 0;
    border-bottom: 0.5px solid var(--border);
    transition: background 0.1s;
  }

  .event-item:last-child { border-bottom: none; }
  .event-item:hover { background: var(--bg2); margin: 0 -1rem; padding-left: 1rem; padding-right: 1rem; border-radius: 6px; }

  .event-meta { padding-top: 2px; }

  .event-date {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text3);
    line-height: 1.5;
  }

  .event-price {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text2);
    font-weight: 500;
    margin-top: 3px;
  }

  .event-body {}

  .event-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }

  .tag {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 500;
  }

  .tag-hack    { background: #FCEBEB; color: #A32D2D; }
  .tag-reg     { background: #E6F1FB; color: #185FA5; }
  .tag-halving { background: #FAEEDA; color: #854F0B; }
  .tag-etf     { background: #EEEDFE; color: #534AB7; }
  .tag-adopt   { background: #EAF3DE; color: #3B6D11; }
  .tag-crash   { background: #FCEBEB; color: #A32D2D; }
  .tag-ath     { background: #FAEEDA; color: #854F0B; }
  .tag-tech    { background: #E1F5EE; color: #0F6E56; }
  .tag-korea   { background: #FBEAF0; color: #993556; }
  .tag-global  { background: #F1EFE8; color: #5F5E5A; }

  @media (prefers-color-scheme: dark) {
    .tag-hack    { background: #2e0a0a; color: #F7C1C1; }
    .tag-reg     { background: #042C53; color: #B5D4F4; }
    .tag-halving { background: #412402; color: #FAC775; }
    .tag-etf     { background: #26215C; color: #CECBF6; }
    .tag-adopt   { background: #173404; color: #C0DD97; }
    .tag-crash   { background: #2e0a0a; color: #F7C1C1; }
    .tag-ath     { background: #412402; color: #FAC775; }
    .tag-tech    { background: #04342C; color: #9FE1CB; }
    .tag-korea   { background: #4B1528; color: #F4C0D1; }
    .tag-global  { background: #2C2C2A; color: #B4B2A9; }
  }

  .event-title {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.45;
    margin-bottom: 5px;
  }

  .event-desc {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.75;
  }

  /* ── FOOTER ── */
  .page-footer {
    margin-top: 4rem;
    padding: 2rem 0;
    border-top: 0.5px solid var(--border);
    font-size: 11px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .container { padding: 0 1rem; }
    .price-strip { flex-wrap: wrap; }
    .price-cell { min-width: 50%; border-bottom: 0.5px solid var(--border); }
    .chart-wrap { height: 280px; }
    .event-item { grid-template-columns: 80px 1fr; gap: 0 0.75rem; }
    .page-hero h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <a href="https://data.blockmedia.co.kr" class="site-logo">BM<span>.</span>DATA</a>
  <div class="header-sep"></div>
  <span class="header-breadcrumb">비트코인 역사 &amp; 가격 추이</span>
</header>

<main class="container">

  <!-- HERO -->
  <div class="page-hero">
    <div class="page-hero-eyebrow">BM Research · Bitcoin Insight</div>
    <h1>비트코인 역사와 가격 추이</h1>
    <p>2009년 제네시스 블록 탄생부터 현재까지 — 주요 사건과 시장 흐름을 한눈에</p>
  </div>

  <!-- PRICE STRIP -->
  <div class="price-strip">
    <div class="price-cell">
      <div class="price-cell-label">BTC / USD</div>
      <div class="price-cell-value" id="p-usd">—</div>
      <div class="badge-change" id="p-chg" style="display:none"></div>
    </div>
    <div class="price-cell">
      <div class="price-cell-label">BTC / KRW 환산</div>
      <div class="price-cell-value sm" id="p-krw">—</div>
    </div>
    <div class="price-cell">
      <div class="price-cell-label">24h 고가</div>
      <div class="price-cell-value sm" id="p-high">—</div>
    </div>
    <div class="price-cell">
      <div class="price-cell-label">24h 저가</div>
      <div class="price-cell-value sm" id="p-low">—</div>
    </div>
    <div class="price-cell" style="border-right:none">
      <div class="price-cell-label">24h 거래량</div>
      <div class="price-cell-value sm" id="p-vol">—</div>
    </div>
  </div>

  <!-- CHART CONTROLS -->
  <div class="chart-controls">
    <button class="btn-ctrl active-type" data-type="candlestick">캔들</button>
    <button class="btn-ctrl" data-type="line">라인</button>
    <div class="ctrl-sep"></div>
    <button class="btn-ctrl" data-days="14">2주</button>
    <button class="btn-ctrl" data-days="30">1개월</button>
    <button class="btn-ctrl active-period" data-days="90">3개월</button>
    <button class="btn-ctrl" data-days="180">6개월</button>
    <button class="btn-ctrl" data-days="365">1년</button>
    <button class="btn-ctrl" data-days="1825">5년</button>
    <button class="btn-ctrl" data-days="max">전체</button>
    <div class="ctrl-sep"></div>
    <button class="btn-ctrl markers-on" id="btnMarkers">📌 이벤트 마커 ON</button>
  </div>

  <!-- CHART -->
  <div class="chart-wrap">
    <div class="chart-loading" id="chartLoading">차트 데이터 불러오는 중...</div>
    <div id="lwChart"></div>
    <div class="ohlc-bar" id="ohlcBar"></div>
    <div class="event-popup" id="eventPopup">
      <button class="event-popup-close" id="popupClose">×</button>
      <div class="event-popup-date" id="popupDate"></div>
      <div class="event-popup-title" id="popupTitle"></div>
      <div class="event-popup-desc" id="popupDesc"></div>
    </div>
  </div>

  <!-- TIMELINE -->
  <div class="section-label">연도별 주요 사건</div>
  <div id="timeline"></div>

  <footer class="page-footer">
    데이터 출처: Binance API · Upbit API &nbsp;·&nbsp; 차트: TradingView Lightweight Charts &nbsp;·&nbsp; 최종 업데이트: <span id="updateDate"></span>
  </footer>

</main>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
const TAG = {
  hack:    { cls: 'tag-hack',    label: '해킹' },
  reg:     { cls: 'tag-reg',     label: '규제' },
  halving: { cls: 'tag-halving', label: '반감기' },
  etf:     { cls: 'tag-etf',     label: 'ETF' },
  adopt:   { cls: 'tag-adopt',   label: '기업채택' },
  crash:   { cls: 'tag-crash',   label: '폭락' },
  ath:     { cls: 'tag-ath',     label: '최고가' },
  tech:    { cls: 'tag-tech',    label: '기술' },
  korea:   { cls: 'tag-korea',   label: '한국' },
  global:  { cls: 'tag-global',  label: '글로벌' },
};

// markerDate: YYYY-MM-DD (차트 마커용), price: 당시 종가 표시용
const EVENTS = [
  // 2026
  { year: 2026, markerDate: '2026-04-20', price: '$74,260', tags: ['global','reg'],
    title: '중동 호르무즈 해협 긴장 고조 — 비트코인 안전자산 논쟁 재점화',
    desc: '이란-미국 갈등으로 호르무즈 해협 봉쇄 위협이 고조되며 유가와 글로벌 금융시장이 요동침. 비트코인이 전통적 안전자산(금)과 함께 거론되며 탈중앙 가치 저장 수단으로서의 위상 논쟁이 재점화됨.' },

  // 2025
  { year: 2025, markerDate: '2025-01-20', price: '$106,000', tags: ['reg','global'],
    title: '트럼프 대통령 취임 — 친암호화폐 행정부 공식 출범',
    desc: '비트코인 전략적 비축과 규제 완화를 공약으로 내세운 트럼프 대통령이 취임. 취임 직후 가상자산 규제 완화 행정명령에 서명하고 친암호화폐 인사들을 SEC·CFTC 수장으로 임명하며 미국의 가상자산 정책이 전면 전환됨.' },
  { year: 2025, markerDate: '2025-03-07', price: '$90,000', tags: ['reg','global'],
    title: '미국 정부, 비트코인 전략적 비축 행정명령 서명',
    desc: '트럼프 대통령이 미국 정부 보유 비트코인을 매각하지 않고 전략적으로 비축하는 행정명령에 서명. 정부가 압수한 약 20만 BTC를 국가 준비금으로 지정. 비트코인이 국가 전략 자산으로 공식 인정된 역사적 사건.' },
  { year: 2025, markerDate: '2025-01-23', price: '$104,000', tags: ['reg','global'],
    title: '미국 SEC, 가상자산 규제 완화 방향 공식화',
    desc: '새 SEC 위원장 폴 앳킨스 체제에서 기존 게리 겐슬러 시대의 강경 규제 기조가 전면 철회됨. 다수의 알트코인 ETF 신청 검토가 재개되고 가상자산 기업에 대한 소송이 잇따라 취하되며 미국 가상자산 산업이 급속히 제도권에 편입됨.' },
  { year: 2025, markerDate: '2025-05-22', price: '$111,000', tags: ['ath'],
    title: '비트코인 역대 최고가 — 111,000달러 돌파 (피자 데이)',
    desc: '비트코인 피자 데이(5월 22일)에 비트코인이 111,000달러를 돌파하며 역대 최고가를 경신. 트럼프 행정부의 친암호화폐 정책, 기관 수요 지속, 반감기 이후 공급 감소가 맞물린 결과.' },

  // 2024

// ── TIMELINE BUILD ─────────────────────────────────────────────────────
function buildTimeline() {
  const container = document.getElementById('timeline');
  const byYear = {};
  EVENTS.forEach(ev => {
    if (!byYear[ev.year]) byYear[ev.year] = [];
    byYear[ev.year].push(ev);
  });
  const years = Object.keys(byYear).sort((a,b) => b-a);
  years.forEach(yr => {
    const block = document.createElement('div');
    block.className = 'year-block year-anchor';
    block.id = 'year-' + yr;
    block.innerHTML = `<div class="year-heading">${yr}</div>`;
    const list = document.createElement('div');
    list.className = 'event-list';
    byYear[yr].sort((a,b) => b.markerDate.localeCompare(a.markerDate)).forEach(ev => {
      const item = document.createElement('div');
      item.className = 'event-item';
      const dateStr = ev.markerDate.replace(/-/g, '.');
      const tags = (ev.tags||[]).map(t => `<span class="tag ${TAG[t].cls}">${TAG[t].label}</span>`).join('');
      item.innerHTML = `
        <div class="event-meta">
          <div class="event-date">${dateStr}</div>
          <div class="event-price">${ev.price}</div>
        </div>
        <div class="event-body">
          <div class="event-tags">${tags}</div>
          <div class="event-title">${ev.title}</div>
          <div class="event-desc">${ev.desc}</div>
        </div>`;
      list.appendChild(item);
    });
    block.appendChild(list);
    container.appendChild(block);
  });
}

// ── PRICE FETCH (Binance) ──────────────────────────────────────────────
async function fetchPrice() {
  try {
    const r = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
    const d = await r.json();
    const price = parseFloat(d.lastPrice);
    const high  = parseFloat(d.highPrice);
    const low   = parseFloat(d.lowPrice);
    const vol   = parseFloat(d.quoteVolume);
    const chg   = parseFloat(d.priceChangePercent);

    // KRW: 업비트 시도, 실패 시 환율 fallback
    let krwPrice = price * 1370;
    try {
      const kr = await fetch('https://api.upbit.com/v1/ticker?markets=KRW-BTC');
      const kd = await kr.json();
      if (kd && kd[0]) krwPrice = kd[0].trade_price;
    } catch(e) {}

    document.getElementById('p-usd').textContent  = '$' + Math.round(price).toLocaleString();
    document.getElementById('p-krw').textContent  = (krwPrice/100000000).toFixed(2) + '억 원';
    document.getElementById('p-high').textContent = '$' + Math.round(high).toLocaleString();
    document.getElementById('p-low').textContent  = '$' + Math.round(low).toLocaleString();
    document.getElementById('p-vol').textContent  = vol >= 1e9 ? (vol/1e9).toFixed(1)+'B' : (vol/1e6).toFixed(0)+'M';

    const el = document.getElementById('p-chg');
    el.textContent = (chg >= 0 ? '+' : '') + chg.toFixed(2) + '%';
    el.className = 'badge-change ' + (chg >= 0 ? 'up' : 'down');
    el.style.display = 'inline-block';
  } catch(e) {
    console.error('가격 조회 실패:', e);
  }
}

// ── CHART ──────────────────────────────────────────────────────────────
const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
let lwChart = null, mainSeries = null, markerSeries = null;
let showMarkers = true;
let currentType = 'candlestick';
let currentDays = 90;

const C = {
  bg:       isDark ? '#111110' : '#ffffff',
  grid:     isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)',
  border:   isDark ? '#333331' : '#e0dfdb',
  text:     isDark ? '#666564' : '#9a9894',
  up:       '#3B6D11',
  down:     '#A32D2D',
  line:     isDark ? '#1D9E75' : '#0f6e56',
  fillTop:  isDark ? 'rgba(29,158,117,0.18)' : 'rgba(15,110,86,0.10)',
  fillBot:  'rgba(0,0,0,0)',
};

function initChart() {
  const wrap = document.getElementById('lwChart');
  lwChart = LightweightCharts.createChart(wrap, {
    width: wrap.clientWidth,
    height: wrap.clientHeight || 380,
    layout: { background: { color: C.bg }, textColor: C.text, fontFamily: "'JetBrains Mono', monospace", fontSize: 11 },
    grid: { vertLines: { color: C.grid }, horzLines: { color: C.grid } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: C.border },
    timeScale: { borderColor: C.border, timeVisible: false, secondsVisible: false },
    handleScroll: true,
    handleScale: true,
  });

  // crosshair tooltip
  lwChart.subscribeCrosshairMove(p => {
    const bar = document.getElementById('ohlcBar');
    if (!p || !p.time || !p.seriesData || !mainSeries) { bar.innerHTML = ''; return; }
    const sd = p.seriesData.get(mainSeries);
    if (!sd) return;
    const dt = new Date(p.time * 1000);
    const dateStr = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    if (currentType === 'candlestick') {
      const upClr = isDark ? '#9FE1CB' : '#3B6D11';
      const dnClr = isDark ? '#F7C1C1' : '#A32D2D';
      bar.innerHTML = `<span style="color:var(--text3)">${dateStr}</span>&nbsp;&nbsp;`
        + `O&nbsp;<b>$${Math.round(sd.open).toLocaleString()}</b>&nbsp;`
        + `H&nbsp;<b style="color:${upClr}">$${Math.round(sd.high).toLocaleString()}</b>&nbsp;`
        + `L&nbsp;<b style="color:${dnClr}">$${Math.round(sd.low).toLocaleString()}</b>&nbsp;`
        + `C&nbsp;<b>$${Math.round(sd.close).toLocaleString()}</b>`;
    } else {
      bar.innerHTML = `<span style="color:var(--text3)">${dateStr}</span>&nbsp;&nbsp;<b>$${Math.round(sd.value).toLocaleString()}</b>`;
    }
  });

  window.addEventListener('resize', () => {
    lwChart.applyOptions({ width: wrap.clientWidth });
  });
}

function dateToUnix(str) { return Math.floor(new Date(str).getTime() / 1000); }

// seriesMarkers 인스턴스 보관 (v4 API)
let seriesMarkersInstance = null;
let clickHandlerRegistered = false;

function applyMarkers(data) {
  // 기존 마커 제거
  if (seriesMarkersInstance) {
    try { seriesMarkersInstance.detachPrimitive ? seriesMarkersInstance.detachPrimitive() : null; } catch(e) {}
    seriesMarkersInstance = null;
  }

  if (!mainSeries || !showMarkers || !data.length) return;

  const dataStart = data[0].time;
  const dataEnd   = data[data.length - 1].time;

  const colorMap = {
    hack: '#A32D2D', reg: '#185FA5', halving: '#EF9F27',
    etf: '#7F77DD', adopt: '#3B6D11', crash: '#A32D2D',
    ath: '#EF9F27', tech: '#0F6E56', korea: '#D4537E', global: '#888780',
  };

  const markers = EVENTS
    .filter(ev => {
      const t = dateToUnix(ev.markerDate);
      return t >= dataStart && t <= dataEnd;
    })
    .map(ev => ({
      time: dateToUnix(ev.markerDate),
      position: 'aboveBar',
      color: colorMap[ev.tags[0]] || '#888780',
      shape: 'circle',
      text: '',
      size: 1.5,
    }))
    .sort((a, b) => a.time - b.time);

  // v4: createSeriesMarkers, 없으면 구버전 setMarkers fallback
  try {
    if (typeof LightweightCharts.createSeriesMarkers === 'function') {
      seriesMarkersInstance = LightweightCharts.createSeriesMarkers(mainSeries, markers);
    } else if (typeof mainSeries.setMarkers === 'function') {
      mainSeries.setMarkers(markers);
    }
  } catch(e) {
    console.warn('마커 적용 실패:', e);
  }

  // 클릭 핸들러는 한 번만 등록
  if (!clickHandlerRegistered) {
    clickHandlerRegistered = true;
    lwChart.subscribeClick(p => {
      if (!p.time) return;
      // 클릭한 시각과 가장 가까운 이벤트 찾기 (±4일 이내)
      const TOLERANCE = 86400 * 4;
      let best = null, bestDiff = Infinity;
      EVENTS.forEach(ev => {
        const diff = Math.abs(dateToUnix(ev.markerDate) - p.time);
        if (diff < TOLERANCE && diff < bestDiff) { bestDiff = diff; best = ev; }
      });
      if (best) showPopup(best);
    });
  }
}

function showPopup(ev) {
  document.getElementById('popupDate').textContent = ev.markerDate.replace(/-/g, '.');
  document.getElementById('popupTitle').textContent = ev.title;
  document.getElementById('popupDesc').textContent = ev.desc;
  document.getElementById('eventPopup').style.display = 'block';
}

// 바이낸스 klines 페이지네이션 fetch (limit 1000개씩 여러 번)
async function fetchBinanceKlines(interval, startMs, endMs) {
  const allData = [];
  let from = startMs;
  while (from < endMs) {
    const url = `https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=${interval}&startTime=${from}&endTime=${endMs}&limit=1000`;
    const raw = await (await fetch(url)).json();
    if (!raw.length) break;
    raw.forEach(d => allData.push({
      time:  Math.floor(d[0] / 1000),
      open:  parseFloat(d[1]),
      high:  parseFloat(d[2]),
      low:   parseFloat(d[3]),
      close: parseFloat(d[4]),
    }));
    from = raw[raw.length - 1][0] + 1; // 다음 시작점
    if (raw.length < 1000) break;      // 마지막 페이지
  }
  return allData;
}

// 기간 → interval + startMs 매핑
function getChartConfig(days) {
  const now = Date.now();
  if (days === 'max')  return { interval: '1w', startMs: new Date('2017-08-01').getTime() };
  if (days >= 1825)    return { interval: '1d', startMs: now - days * 86400000 };
  if (days >= 365)     return { interval: '1d', startMs: now - days * 86400000 };
  if (days >= 180)     return { interval: '4h', startMs: now - days * 86400000 };
  if (days >= 90)      return { interval: '4h', startMs: now - days * 86400000 };
  if (days >= 30)      return { interval: '1h', startMs: now - days * 86400000 };
  return                      { interval: '1h', startMs: now - days * 86400000 };
}

async function loadChart(days, type) {
  document.getElementById('chartLoading').style.display = 'flex';
  document.getElementById('ohlcBar').innerHTML = '';
  document.getElementById('eventPopup').style.display = 'none';

  try {
    const { interval, startMs } = getChartConfig(days);
    const endMs = Date.now();
    const allData = await fetchBinanceKlines(interval, startMs, endMs);

    // 중복 제거 & 정렬
    const seen = new Set();
    const data = allData
      .filter(d => { if (seen.has(d.time)) return false; seen.add(d.time); return true; })
      .sort((a, b) => a.time - b.time);

    if (!data.length) throw new Error('데이터 없음');

    if (!lwChart) initChart();
    if (mainSeries) { try { lwChart.removeSeries(mainSeries); } catch(e){} }

    if (type === 'candlestick') {
      mainSeries = lwChart.addCandlestickSeries({
        upColor: C.up, downColor: C.down,
        borderUpColor: C.up, borderDownColor: C.down,
        wickUpColor: C.up, wickDownColor: C.down,
        priceLineVisible: false,
      });
      mainSeries.setData(data);
    } else {
      mainSeries = lwChart.addAreaSeries({
        lineColor: C.line,
        topColor: C.fillTop,
        bottomColor: C.fillBot,
        lineWidth: 1.5,
        priceLineVisible: false,
      });
      mainSeries.setData(data.map(d => ({ time: d.time, value: d.close })));
    }

    lwChart.timeScale().fitContent();
    applyMarkers(data);
    document.getElementById('chartLoading').style.display = 'none';
  } catch(e) {
    console.error(e);
    document.getElementById('chartLoading').textContent = '데이터를 불러올 수 없습니다. (API 오류 또는 네트워크 문제)';
  }
}

// ── CONTROLS ───────────────────────────────────────────────────────────
document.querySelectorAll('[data-type]').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active-type'));
    this.classList.add('active-type');

    loadChart(currentDays, currentType);

});

document.querySelectorAll('[data-days]').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('[data-days]').forEach(b => b.classList.remove('active-period'));
    this.classList.add('active-period');
    currentDays = this.dataset.days === 'max' ? 'max' : parseInt(this.dataset.days);
    loadChart(currentDays, currentType);
  });
});

document.getElementById('btnMarkers').addEventListener('click', function() {
  showMarkers = !showMarkers;
  this.textContent = showMarkers ? '📌 이벤트 마커 ON' : '📌 이벤트 마커 OFF';
  this.classList.toggle('markers-on', showMarkers);
  if (!showMarkers && seriesMarkersInstance) {
    try { seriesMarkersInstance.detachPrimitive ? seriesMarkersInstance.detachPrimitive() : null; } catch(e) {}
    seriesMarkersInstance = null;
    if (mainSeries && typeof mainSeries.setMarkers === 'function') {
      try { mainSeries.setMarkers([]); } catch(e) {}
    }
  } else {
    loadChart(currentDays, currentType);
  }
});

document.getElementById('popupClose').addEventListener('click', () => {
  document.getElementById('eventPopup').style.display = 'none';
});

// ── INIT ───────────────────────────────────────────────────────────────
buildTimeline();
fetchPrice();
loadChart(90, 'candlestick');
document.getElementById('updateDate').textContent = new Date().toLocaleDateString('ko-KR');
