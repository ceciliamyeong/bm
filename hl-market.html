<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyperliquid Market Dashboard</title>
<style>
  :root {
    --bg: #0d0d0f;
    --bg2: #141417;
    --bg3: #1a1a1f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8e8ec;
    --text2: #888893;
    --text3: #55555f;
    --green: #23c97d;
    --green-bg: rgba(35,201,125,0.1);
    --red: #f05454;
    --red-bg: rgba(240,84,84,0.1);
    --amber: #f0a832;
    --amber-bg: rgba(240,168,50,0.1);
    --blue: #5c6fff;
    --blue-bg: rgba(92,111,255,0.12);
    --font: -apple-system, 'Helvetica Neue', sans-serif;
    --font-mono: 'SF Mono', 'Fira Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.5; min-height: 100vh; }

  /* Header */
  header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 20; }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: blink 2s ease infinite; flex-shrink: 0; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .update-time { font-size: 11px; color: var(--text3); font-family: var(--font-mono); }
  .refresh-btn { display: flex; align-items: center; gap: 5px; padding: 5px 11px; background: transparent; border: 1px solid var(--border2); border-radius: 6px; color: var(--text2); font-size: 12px; cursor: pointer; transition: all .15s; }
  .refresh-btn:hover { border-color: var(--blue); color: var(--blue); }
  .refresh-btn svg { width: 12px; height: 12px; }

  /* Tabs */
  .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 24px; gap: 2px; }
  .tab { padding: 10px 16px; font-size: 13px; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; background: none; border-top: none; border-left: none; border-right: none; }
  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--text); border-bottom-color: var(--blue); }
  .tab-badge { display: inline-block; margin-left: 6px; font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--bg3); color: var(--text3); font-family: var(--font-mono); vertical-align: middle; }
  .tab.active .tab-badge { background: var(--blue-bg); color: var(--blue); }

  /* KPI strip */
  .kpi-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .kpi { background: var(--bg); padding: 13px 22px; }
  .kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); margin-bottom: 4px; }
  .kpi-value { font-size: 19px; font-weight: 600; font-family: var(--font-mono); color: var(--text); letter-spacing: -.02em; }
  .kpi-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* Controls */
  .controls { display: flex; align-items: center; gap: 8px; padding: 10px 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .search-wrap { position: relative; }
  .search-wrap input { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 5px 10px 5px 28px; width: 150px; outline: none; transition: border-color .15s; }
  .search-wrap input:focus { border-color: var(--blue); }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 13px; pointer-events: none; }
  .filter-group { display: flex; gap: 3px; }
  .filt-btn { padding: 4px 9px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 11px; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .filt-btn:hover { border-color: var(--border2); color: var(--text); }
  .filt-btn.active { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
  .cat-group { display: flex; gap: 3px; }
  .cat-btn { padding: 4px 9px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--text3); font-size: 11px; cursor: pointer; transition: all .15s; }
  .cat-btn:hover { color: var(--text2); border-color: var(--border2); }
  .cat-btn.active { border-color: var(--border2); color: var(--text2); background: var(--bg3); }
  .result-count { margin-left: auto; font-size: 11px; color: var(--text3); font-family: var(--font-mono); }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  colgroup col.col-coin  { width: 14%; }
  colgroup col.col-cat   { width: 10%; }
  colgroup col.col-price { width: 13%; }
  colgroup col.col-chg   { width: 10%; }
  colgroup col.col-fr    { width: 12%; }
  colgroup col.col-oi    { width: 13%; }
  colgroup col.col-vol   { width: 13%; }
  colgroup col.col-dex   { width: 9%; }
  colgroup col.col-mark  { width: 6%; }

  thead tr { border-bottom: 1px solid var(--border); }
  th { padding: 8px 14px; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); text-align: right; cursor: pointer; user-select: none; white-space: nowrap; background: var(--bg); transition: color .15s; }
  th:first-child { text-align: left; }
  th:hover { color: var(--text2); }
  th.sort-desc::after { content: ' ↓'; color: var(--blue); }
  th.sort-asc::after  { content: ' ↑'; color: var(--blue); }

  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:hover { background: var(--bg2); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 8px 14px; text-align: right; color: var(--text); font-family: var(--font-mono); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  td:first-child { text-align: left; font-family: var(--font); }

  .coin-cell { display: flex; flex-direction: column; }
  .coin-name { font-size: 13px; font-weight: 600; color: var(--text); font-family: var(--font); letter-spacing: -.01em; }
  .coin-tag  { font-size: 10px; color: var(--text3); font-family: var(--font); margin-top: 1px; }

  .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 500; font-family: var(--font-mono); }
  .badge-up   { background: var(--green-bg); color: var(--green); }
  .badge-dn   { background: var(--red-bg);   color: var(--red); }
  .badge-warn { background: var(--amber-bg); color: var(--amber); }
  .badge-neu  { background: rgba(255,255,255,0.05); color: var(--text2); }
  .badge-cat  { font-size: 10px; padding: 1px 5px; border-radius: 3px; font-family: var(--font); font-weight: 500; }
  .cat-stock  { background: rgba(92,111,255,0.12); color: #7c8fff; }
  .cat-index  { background: rgba(240,168,50,0.12); color: var(--amber); }
  .cat-commodity { background: rgba(35,201,125,0.1); color: var(--green); }
  .cat-fx     { background: rgba(240,84,84,0.1); color: var(--red); }
  .cat-crypto { background: rgba(255,255,255,0.06); color: var(--text2); }
  .cat-other  { background: rgba(255,255,255,0.04); color: var(--text3); }
  .dex-label  { font-size: 10px; color: var(--text3); font-family: var(--font); }

  /* States */
  .state-row td { text-align: center; padding: 48px 14px; color: var(--text3); font-family: var(--font); font-size: 13px; }
  .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .kpi-strip { grid-template-columns: repeat(2, 1fr); }
    header, .kpi, .controls { padding-left: 14px; padding-right: 14px; }
    .tabs { padding: 0 14px; }
    th, td { padding: 7px 8px; }
    .hide-m { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="live-dot"></span>
    Hyperliquid Markets
  </div>
  <div class="header-right">
    <span class="update-time" id="update-time">—</span>
    <button class="refresh-btn" onclick="loadAll()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1.5 8A6.5 6.5 0 1 0 4 3.5"/><polyline points="1.5,1.5 1.5,3.5 3.5,3.5"/>
      </svg>
      새로고침
    </button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('crypto', this)">
    Crypto Perps <span class="tab-badge" id="badge-crypto">—</span>
  </button>
  <button class="tab" onclick="switchTab('hip3', this)">
    HIP-3 (주식·원자재·FX) <span class="tab-badge" id="badge-hip3">—</span>
  </button>
</div>

<div class="kpi-strip">
  <div class="kpi">
    <div class="kpi-label">총 마켓</div>
    <div class="kpi-value" id="k-markets">—</div>
    <div class="kpi-sub" id="k-markets-sub">pairs</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">총 OI</div>
    <div class="kpi-value" id="k-oi">—</div>
    <div class="kpi-sub">Open Interest (USD)</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">24h 거래량</div>
    <div class="kpi-value" id="k-vol">—</div>
    <div class="kpi-sub">Notional volume</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">평균 펀딩비</div>
    <div class="kpi-value" id="k-fr">—</div>
    <div class="kpi-sub">8h rate</div>
  </div>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="코인 검색..." oninput="applyFilters()">
  </div>

  <!-- crypto filters -->
  <div class="filter-group" id="crypto-filters">
    <button class="filt-btn active" onclick="setFilter('all',this)">전체</button>
    <button class="filt-btn" onclick="setFilter('up',this)">상승</button>
    <button class="filt-btn" onclick="setFilter('dn',this)">하락</button>
    <button class="filt-btn" onclick="setFilter('highfr',this)">고펀딩</button>
    <button class="filt-btn" onclick="setFilter('negfr',this)">음펀딩</button>
    <button class="filt-btn" onclick="setFilter('highoi',this)">고OI</button>
  </div>

  <!-- hip3 filters -->
  <div class="cat-group" id="hip3-filters" style="display:none;">
    <button class="cat-btn active" onclick="setCat('all',this)">전체</button>
    <button class="cat-btn" onclick="setCat('stock',this)">주식</button>
    <button class="cat-btn" onclick="setCat('index',this)">지수</button>
    <button class="cat-btn" onclick="setCat('commodity',this)">원자재</button>
    <button class="cat-btn" onclick="setCat('fx',this)">FX</button>
  </div>

  <span class="result-count" id="result-count"></span>
</div>

<div class="table-wrap">
  <table id="main-table">
    <colgroup id="colgroup">
      <col class="col-coin">
      <col class="col-price">
      <col class="col-chg">
      <col class="col-fr">
      <col class="col-oi">
      <col class="col-vol">
      <col class="col-mark hide-m">
    </colgroup>
    <thead id="thead">
      <tr>
        <th onclick="sortBy('coin')">코인</th>
        <th onclick="sortBy('price')">마크가격</th>
        <th onclick="sortBy('chg')">24h 변동</th>
        <th onclick="sortBy('fr')">펀딩비 (8h)</th>
        <th onclick="sortBy('oi')">OI</th>
        <th onclick="sortBy('vol')">24h 거래량</th>
        <th class="hide-m" onclick="sortBy('mark')">전일 종가</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr class="state-row"><td colspan="7"><span class="spin"></span>데이터 불러오는 중...</td></tr>
    </tbody>
  </table>
</div>

<script>
const HIP3_DEXES = ['xyz', 'cash', 'flx', 'km'];

// 카테고리 분류 키워드
const CATS = {
  index:     ['SP500','USA500','NAS100','NDX','DJI','NASDAQ','S&P','QQQ','SPX','NIKKEI','DAX','FTSE','HSI'],
  commodity: ['GOLD','SILVER','XAU','XAG','OIL','WTI','BRENT','CL','NG','NATGAS','COPPER','WHEAT','CORN','URANIUM'],
  fx:        ['EUR','GBP','JPY','CHF','AUD','CAD','NZD','CNH','USD','KRW','FOREX','FX'],
  stock:     ['AAPL','TSLA','NVDA','MSFT','AMZN','GOOGL','META','AMD','INTC','PLTR','COIN','HOOD',
               'MSTR','ORCL','MU','NFLX','RIVN','BABA','SPC','SPY','OPENAI','SPACEX','RKLB','LUNR']
};

function guessCategory(name) {
  const n = name.toUpperCase();
  for (const [cat, keys] of Object.entries(CATS)) {
    if (keys.some(k => n.includes(k))) return cat;
  }
  return 'other';
}

let cryptoData = [];
let hip3Data   = [];
let currentTab = 'crypto';
let sortCol    = 'vol';
let sortDir    = -1;
let filterMode = 'all';
let catMode    = 'all';

async function fetchPerp(dex) {
  const body = dex ? { type: 'metaAndAssetCtxs', dex } : { type: 'metaAndAssetCtxs' };
  const res = await fetch('https://api.hyperliquid.xyz/info', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

function parseCtx(ctx, dexName) {
  const universe = ctx[0]?.universe || [];
  const ctxList  = ctx[1] || [];
  return universe.map((coin, i) => {
    const c    = ctxList[i] || {};
    const mark = parseFloat(c.markPx  || 0);
    const prev = parseFloat(c.prevDayPx || mark);
    const chg  = prev > 0 ? (mark - prev) / prev * 100 : 0;
    const fr   = parseFloat(c.funding || 0) * 100;
    const oi   = parseFloat(c.openInterest || 0) * mark;
    const vol  = parseFloat(c.dayNtlVlm || 0);
    const cat  = dexName ? guessCategory(coin.name) : 'crypto';
    return { coin: coin.name, price: mark, prev, chg, fr, oi, vol, mark, dex: dexName || '', cat };
  }).filter(d => d.price > 0);
}

async function loadAll() {
  showLoading();
  try {
    // 크립토 + HIP-3 병렬 fetch
    const [cryptoCtx, ...hip3Ctxs] = await Promise.all([
      fetchPerp(null),
      ...HIP3_DEXES.map(d => fetchPerp(d).catch(() => null))
    ]);

    cryptoData = parseCtx(cryptoCtx, '');

    hip3Data = [];
    HIP3_DEXES.forEach((dex, i) => {
      if (hip3Ctxs[i]) hip3Data.push(...parseCtx(hip3Ctxs[i], dex));
    });
    // 거래량 0 제거 후 중복 제거 (같은 코인명 다른 dex)
    hip3Data = hip3Data.filter(d => d.vol > 0);

    document.getElementById('badge-crypto').textContent = cryptoData.length;
    document.getElementById('badge-hip3').textContent   = hip3Data.length;

    const now = new Date();
    document.getElementById('update-time').textContent =
      now.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });

    updateKPI();
    applyFilters();
  } catch(e) {
    document.getElementById('tbody').innerHTML =
      `<tr class="state-row"><td colspan="8">⚠ 로드 실패: ${e.message}</td></tr>`;
    document.getElementById('update-time').textContent = '로드 실패';
  }
}

function showLoading() {
  if (currentTab === 'crypto' && cryptoData.length === 0 ||
      currentTab === 'hip3'   && hip3Data.length === 0) {
    document.getElementById('tbody').innerHTML =
      '<tr class="state-row"><td colspan="8"><span class="spin"></span>데이터 불러오는 중...</td></tr>';
  }
}

function getCurrentData() {
  return currentTab === 'crypto' ? cryptoData : hip3Data;
}

function updateKPI() {
  const data = getCurrentData();
  const totalOI  = data.reduce((a,d)=>a+d.oi, 0);
  const totalVol = data.reduce((a,d)=>a+d.vol, 0);
  const avgFR    = data.length ? data.reduce((a,d)=>a+d.fr, 0) / data.length : 0;

  document.getElementById('k-markets').textContent     = data.length;
  document.getElementById('k-markets-sub').textContent = currentTab === 'hip3' ? 'HIP-3 pairs' : 'Perp pairs';
  document.getElementById('k-oi').textContent          = '$' + fmtB(totalOI);
  document.getElementById('k-vol').textContent         = '$' + fmtB(totalVol);
  document.getElementById('k-fr').textContent          = (avgFR >= 0 ? '+' : '') + avgFR.toFixed(4) + '%';
  document.getElementById('k-fr').style.color          = avgFR >= 0 ? 'var(--green)' : 'var(--red)';
}

function applyFilters() {
  const q    = document.getElementById('search').value.trim().toUpperCase();
  let data   = getCurrentData().filter(d => !q || d.coin.toUpperCase().includes(q));

  if (currentTab === 'crypto') {
    const top20OI = [...data].sort((a,b)=>b.oi-a.oi).slice(0,20).map(d=>d.coin);
    if (filterMode === 'up')     data = data.filter(d => d.chg >= 0);
    if (filterMode === 'dn')     data = data.filter(d => d.chg < 0);
    if (filterMode === 'highfr') data = data.filter(d => d.fr > 0.005);
    if (filterMode === 'negfr')  data = data.filter(d => d.fr < 0);
    if (filterMode === 'highoi') data = data.filter(d => top20OI.includes(d.coin));
  } else {
    if (catMode !== 'all') data = data.filter(d => d.cat === catMode);
  }

  const sorted = [...data].sort((a,b) => {
    if (sortCol === 'coin') return sortDir * a.coin.localeCompare(b.coin);
    return sortDir * (b[sortCol] - a[sortCol]);
  });

  renderTable(sorted);
  document.getElementById('result-count').textContent =
    sorted.length + ' / ' + getCurrentData().length + ' 마켓';
}

function renderTable(data) {
  const isHip3 = currentTab === 'hip3';

  // 헤더 컬럼 설정
  const colg = document.getElementById('colgroup');
  const thead = document.getElementById('thead');
  const cols = isHip3
    ? ['coin','cat','price','chg','fr','oi','vol','dex']
    : ['coin','price','chg','fr','oi','vol','mark'];

  if (isHip3) {
    colg.innerHTML = `<col class="col-coin"><col class="col-cat"><col class="col-price"><col class="col-chg">
      <col class="col-fr"><col class="col-oi"><col class="col-vol"><col class="col-dex">`;
    thead.innerHTML = `<tr>
      <th onclick="sortBy('coin')">코인</th>
      <th>카테고리</th>
      <th onclick="sortBy('price')">가격</th>
      <th onclick="sortBy('chg')">24h 변동</th>
      <th onclick="sortBy('fr')">펀딩비 (8h)</th>
      <th onclick="sortBy('oi')">OI</th>
      <th onclick="sortBy('vol')">24h 거래량</th>
      <th>DEX</th>
    </tr>`;
  } else {
    colg.innerHTML = `<col class="col-coin"><col class="col-price"><col class="col-chg"><col class="col-fr">
      <col class="col-oi"><col class="col-vol"><col class="col-mark hide-m">`;
    thead.innerHTML = `<tr>
      <th onclick="sortBy('coin')">코인</th>
      <th onclick="sortBy('price')">마크가격</th>
      <th onclick="sortBy('chg')">24h 변동</th>
      <th onclick="sortBy('fr')">펀딩비 (8h)</th>
      <th onclick="sortBy('oi')">OI</th>
      <th onclick="sortBy('vol')">24h 거래량</th>
      <th class="hide-m" onclick="sortBy('mark')">전일 종가</th>
    </tr>`;
  }

  // sort 표시
  const allCols = isHip3
    ? ['coin','cat','price','chg','fr','oi','vol','dex']
    : ['coin','price','chg','fr','oi','vol','mark'];
  document.querySelectorAll('th').forEach((th,i) => {
    th.classList.remove('sort-asc','sort-desc');
    if (allCols[i] === sortCol) th.classList.add(sortDir === -1 ? 'sort-desc' : 'sort-asc');
  });

  const colCount = isHip3 ? 8 : 7;

  if (!data.length) {
    document.getElementById('tbody').innerHTML =
      `<tr class="state-row"><td colspan="${colCount}">검색 결과 없음</td></tr>`;
    return;
  }

  const CAT_LABELS = { stock:'주식', index:'지수', commodity:'원자재', fx:'FX', crypto:'Crypto', other:'기타' };

  document.getElementById('tbody').innerHTML = data.map(d => {
    const chgBadge = `<span class="badge badge-${d.chg>=0?'up':'dn'}">${d.chg>=0?'+':''}${d.chg.toFixed(2)}%</span>`;
    const frBadge  = `<span class="badge badge-${d.fr<0?'dn':d.fr>0.005?'warn':'up'}">${d.fr>=0?'+':''}${d.fr.toFixed(4)}%</span>`;

    if (isHip3) {
      const catLabel = CAT_LABELS[d.cat] || '기타';
      return `<tr>
        <td><div class="coin-cell">
          <span class="coin-name">${d.coin}</span>
          <span class="coin-tag">PERP · USDC</span>
        </div></td>
        <td style="text-align:left"><span class="badge badge-cat cat-${d.cat}">${catLabel}</span></td>
        <td>${fmtPrice(d.price)}</td>
        <td>${chgBadge}</td>
        <td>${frBadge}</td>
        <td>$${fmtB(d.oi)}</td>
        <td>$${fmtB(d.vol)}</td>
        <td><span class="dex-label">${d.dex}</span></td>
      </tr>`;
    } else {
      return `<tr>
        <td><div class="coin-cell">
          <span class="coin-name">${d.coin}</span>
          <span class="coin-tag">PERP · USDC</span>
        </div></td>
        <td>${fmtPrice(d.price)}</td>
        <td>${chgBadge}</td>
        <td>${frBadge}</td>
        <td>$${fmtB(d.oi)}</td>
        <td>$${fmtB(d.vol)}</td>
        <td class="hide-m">${fmtPrice(d.prev)}</td>
      </tr>`;
    }
  }).join('');
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('crypto-filters').style.display = tab === 'crypto' ? '' : 'none';
  document.getElementById('hip3-filters').style.display   = tab === 'hip3'   ? '' : 'none';
  document.getElementById('search').value = '';
  sortCol = 'vol'; sortDir = -1;
  updateKPI();
  applyFilters();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = col === 'coin' ? 1 : -1; }
  applyFilters();
}
function setFilter(mode, btn) {
  filterMode = mode;
  document.querySelectorAll('.filt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}
function setCat(mode, btn) {
  catMode = mode;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function fmtB(v) {
  if (v >= 1e9) return (v/1e9).toFixed(2)+'B';
  if (v >= 1e6) return (v/1e6).toFixed(2)+'M';
  if (v >= 1e3) return (v/1e3).toFixed(1)+'K';
  return v.toFixed(0);
}
function fmtPrice(v) {
  if (!v) return '—';
  if (v >= 10000) return '$'+v.toLocaleString('en-US',{maximumFractionDigits:0});
  if (v >= 1000)  return '$'+v.toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1});
  if (v >= 1)     return '$'+v.toFixed(3);
  return '$'+v.toPrecision(4);
}

loadAll();
setInterval(loadAll, 30000);
</script>
