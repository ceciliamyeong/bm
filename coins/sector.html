<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">섹터 | 블록미디어</title>
  <meta name="description" content="블록미디어 섹터별 코인 현황" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0efec;
      --text: #1a1a18; --text2: #5f5e5a; --text3: #9a9894;
      --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.18);
      --accent: #0f6e56; --up: #3B6D11; --up-bg: #EAF3DE;
      --down: #A32D2D; --down-bg: #FCEBEB;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110; --bg2: #1a1a18; --bg3: #222220;
        --text: #e8e7e3; --text2: #888780; --text3: #555450;
        --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
        --accent: #1D9E75; --up: #9FE1CB; --up-bg: #0a2e20;
        --down: #F7C1C1; --down-bg: #2e0a0a;
      }
    }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

    /* ── HEADER ── */
    .site-header { border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 52px; display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; background: var(--bg); z-index: 100; }
    .site-logo { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; color: var(--text); text-decoration: none; letter-spacing: -0.02em; }
    .site-logo span { color: var(--accent); }
    .header-sep { width: 1px; height: 16px; background: var(--border2); }
    .site-nav { display: flex; align-items: center; gap: 4px; margin-left: auto; overflow-x: auto; }
    .nav-link { font-size: 11px; font-family: 'JetBrains Mono', monospace; padding: 5px 10px; border-radius: 4px; text-decoration: none; color: var(--text2); transition: all 0.12s; white-space: nowrap; }
    .nav-link:hover { background: var(--bg2); color: var(--text); }
    .nav-link.active { background: var(--text); color: var(--bg); }

    .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* ── 섹터 헤더 ── */
    .sector-hero { margin-bottom: 2rem; }
    .sector-hero-top { display: flex; align-items: center; gap: 12px; margin-bottom: 0.5rem; flex-wrap: wrap; }
    .sector-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .sector-name { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
    .sector-desc { font-size: 13px; color: var(--text2); max-width: 600px; line-height: 1.7; }
    .sector-count { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--text3); margin-top: 4px; }

    /* ── 섹터 탭 ── */
    .sector-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 2rem; }
    .sector-tab {
      padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600;
      font-family: 'JetBrains Mono', monospace; border: 1px solid var(--border2);
      background: var(--bg2); color: var(--text2); cursor: pointer;
      text-decoration: none; transition: all 0.15s; white-space: nowrap;
    }
    .sector-tab:hover { color: var(--text); border-color: var(--text); }
    .sector-tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* ── 코인 그리드 ── */
    .coin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
    @media (max-width: 640px) { .coin-grid { grid-template-columns: 1fr; } }

    .coin-card {
      background: var(--bg2); border: 0.5px solid var(--border); border-radius: 10px;
      padding: 16px; text-decoration: none; color: var(--text);
      transition: all 0.15s; display: block;
    }
    .coin-card:hover { border-color: var(--border2); box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-1px); }
    .coin-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .coin-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
    .coin-card-name { font-size: 15px; font-weight: 700; }
    .coin-card-ticker { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
    .coin-card-price { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; letter-spacing: -0.03em; margin-bottom: 4px; }
    .coin-card-chg { font-size: 12px; font-family: 'JetBrains Mono', monospace; font-weight: 600; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 10px; }
    .coin-card-chg.up { background: var(--up-bg); color: var(--up); }
    .coin-card-chg.down { background: var(--down-bg); color: var(--down); }
    .coin-card-meta { display: flex; gap: 0; border-top: 0.5px solid var(--border); padding-top: 10px; }
    .coin-meta-item { flex: 1; }
    .coin-meta-item + .coin-meta-item { border-left: 0.5px solid var(--border); padding-left: 10px; }
    .coin-meta-label { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
    .coin-meta-value { font-size: 12px; font-family: 'JetBrains Mono', monospace; font-weight: 600; }
    .coin-meta-value.up { color: var(--up); }
    .coin-meta-value.down { color: var(--down); }
    .coin-sectors { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px; }
    .coin-sector-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); color: var(--text2); font-family: 'JetBrains Mono', monospace; }
    .coin-sector-badge.current { background: var(--text); color: var(--bg); border-color: var(--text); }
    .etf-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: rgba(15,110,86,0.1); border: 1px solid rgba(15,110,86,0.3); color: var(--accent); font-family: 'JetBrains Mono', monospace; font-weight: 600; }

    .loading-msg { text-align: center; color: var(--text3); font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 3rem; }

    footer { border-top: 0.5px solid var(--border); padding: 1.5rem; text-align: center; font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>

<header class="site-header">
  <a href="https://data.blockmedia.co.kr" class="site-logo">BM<span>.</span>DATA</a>
  <div class="header-sep"></div>
  <nav class="site-nav">
    <a class="nav-link" href="https://data.blockmedia.co.kr/index.html">🇰🇷 KRW Market</a>
    <a class="nav-link" href="https://data.blockmedia.co.kr/bm20_index.html">📊 BM20 Index</a>
    <a class="nav-link" href="https://data.blockmedia.co.kr/etf.html">🌐 US ETF Flow</a>
    <a class="nav-link" href="https://data.blockmedia.co.kr/history.html">₿ BTC 역사</a>
    <a class="nav-link" href="https://data.blockmedia.co.kr/performance.html">📅 Performance</a>
    <a class="nav-link" href="https://data.blockmedia.co.kr/clm_brief.html">🧠 코생지</a>
  </nav>
</header>

<div class="container">

  <!-- 섹터 탭 -->
  <div class="sector-tabs" id="sectorTabs">
    <div class="loading-msg">로딩 중...</div>
  </div>

  <!-- 섹터 헤더 -->
  <div class="sector-hero">
    <div class="sector-hero-top">
      <div class="sector-icon" id="sectorIcon">📊</div>
      <div>
        <div class="sector-name" id="sectorName">-</div>
        <div class="sector-count" id="sectorCount"></div>
      </div>
    </div>
    <div class="sector-desc" id="sectorDesc"></div>
  </div>

  <!-- 코인 카드 그리드 -->
  <div class="coin-grid" id="coinGrid">
    <div class="loading-msg">코인 데이터 불러오는 중...</div>
  </div>

</div>

<footer>데이터: Binance API · SoSoValue · BLOCKMEDIA</footer>

<script>
// ── 섹터 메타 ──────────────────────────────────────────────
const SECTOR_META = {
  'Layer1':          { icon: '⛓', desc: '독자적인 블록체인 네트워크를 운영하는 기반 레이어 프로토콜' },
  'Layer0':          { icon: '🔗', desc: '여러 블록체인을 연결하는 인터체인 인프라 레이어' },
  'DeFi':            { icon: '🏦', desc: '탈중앙화 금융 프로토콜 — 대출, 유동성, 파생상품 등' },
  'DEX':             { icon: '🔄', desc: '탈중앙화 거래소 — 스마트 컨트랙트 기반 토큰 거래' },
  'Smart Contract':  { icon: '📜', desc: '스마트 컨트랙트 플랫폼 — 탈중앙화 앱(dApp) 실행 환경' },
  'Payments':        { icon: '💸', desc: '결제 및 송금에 특화된 블록체인 네트워크' },
  'Store of Value':  { icon: '🪙', desc: '가치 저장 수단으로 활용되는 디지털 자산' },
  'Meme':            { icon: '🐕', desc: '커뮤니티와 밈 문화를 기반으로 성장한 코인' },
  'RWA':             { icon: '🏛', desc: '부동산·채권 등 실물 자산을 블록체인에 토큰화' },
  'Oracle':          { icon: '🔮', desc: '블록체인과 외부 데이터를 연결하는 오라클 네트워크' },
  'AI':              { icon: '🤖', desc: 'AI와 블록체인을 결합한 탈중앙화 인공지능 프로젝트' },
  'Privacy':         { icon: '🔒', desc: '프라이버시와 익명성을 강화한 블록체인 네트워크' },
  'Enterprise':      { icon: '🏢', desc: '기업용 블록체인 솔루션 및 엔터프라이즈 네트워크' },
  'Interoperability':{ icon: '🌐', desc: '서로 다른 블록체인 간 상호운용성을 지원하는 프로토콜' },
  'Stablecoin':      { icon: '💵', desc: '법정화폐 가치에 연동된 안정적인 디지털 자산' },
};

// ETF 있는 코인
const ETF_COINS = new Set(['BTC','ETH','SOL','XRP','DOGE','HYPE','LINK','LTC','AVAX','HBAR','DOT']);

let COIN_DATA = {};
let currentSector = '';
let priceCache = {};

// ── 유틸 ──────────────────────────────────────────────────
function fmtPrice(p) {
  if (!p || isNaN(p)) return '—';
  if (p >= 1000) return '$' + Math.round(p).toLocaleString();
  if (p >= 1)    return '$' + parseFloat(p).toFixed(2);
  if (p >= 0.01) return '$' + parseFloat(p).toFixed(4);
  return '$' + parseFloat(p).toFixed(6);
}
function fmtVol(v) {
  if (!v || isNaN(v)) return '—';
  if (v >= 1e9) return '$' + (v/1e9).toFixed(1) + 'B';
  if (v >= 1e6) return '$' + (v/1e6).toFixed(0) + 'M';
  return '$' + (v/1e3).toFixed(0) + 'K';
}

// ── URL 파라미터 ──────────────────────────────────────────
function getSectorFromUrl() {
  const p = new URLSearchParams(window.location.search);
  return p.get('sector') || 'Layer1';
}

// ── coin_sectors.json 로드 ────────────────────────────────
async function loadCoinData() {
  const r = await fetch('../data/coin_sectors.json');
  COIN_DATA = await r.json();
}

// ── 섹터 탭 렌더 ─────────────────────────────────────────
function renderTabs(activeSector) {
  const allSectors = new Set();
  Object.values(COIN_DATA).forEach(c => c.sectors.forEach(s => allSectors.add(s)));
  const tabs = document.getElementById('sectorTabs');
  tabs.innerHTML = '';
  [...allSectors].sort().forEach(sector => {
    const a = document.createElement('a');
    a.className = 'sector-tab' + (sector === activeSector ? ' active' : '');
    a.href = `sector.html?sector=${encodeURIComponent(sector)}`;
    const meta = SECTOR_META[sector] || {};
    a.textContent = (meta.icon || '•') + ' ' + sector;
    tabs.appendChild(a);
  });
}

// ── 섹터 헤더 렌더 ───────────────────────────────────────
function renderHero(sector, coins) {
  const meta = SECTOR_META[sector] || { icon: '📊', desc: '' };
  document.getElementById('sectorIcon').textContent = meta.icon;
  document.getElementById('sectorName').textContent = sector;
  document.getElementById('sectorCount').textContent = `${coins.length}개 코인`;
  document.getElementById('sectorDesc').textContent = meta.desc;
  document.title = `${sector} 섹터 | 블록미디어`;
}

// ── 가격 fetch (Binance) ──────────────────────────────────
async function fetchPrices(tickers) {
  // 스테이블코인은 가격 1로 처리
  const stables = new Set(['USDT','USDC']);
  const toFetch = tickers.filter(t => !stables.has(t) && !priceCache[t]);
  
  if (toFetch.length > 0) {
    const symbols = JSON.stringify(toFetch.map(t => t + 'USDT'));
    try {
      const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=${encodeURIComponent(symbols)}`);
      const data = await r.json();
      data.forEach(d => {
        const ticker = d.symbol.replace('USDT','');
        priceCache[ticker] = {
          price: parseFloat(d.lastPrice),
          chg:   parseFloat(d.priceChangePercent),
          vol:   parseFloat(d.quoteVolume),
        };
      });
    } catch(e) { console.error('Binance fetch error', e); }
  }

  stables.forEach(t => {
    if (!priceCache[t]) priceCache[t] = { price: 1.0, chg: 0, vol: 0 };
  });
}

// ── 코인 카드 렌더 ───────────────────────────────────────
function renderCards(sector, coins) {
  const grid = document.getElementById('coinGrid');
  grid.innerHTML = '';

  if (coins.length === 0) {
    grid.innerHTML = '<div class="loading-msg">해당 섹터에 코인이 없습니다.</div>';
    return;
  }

  // 시총 순 정렬 (가격 × 임의 supply 근사 — Binance 거래량 기준 정렬)
  coins.sort((a, b) => {
    const va = priceCache[a]?.vol || 0;
    const vb = priceCache[b]?.vol || 0;
    return vb - va;
  });

  coins.forEach(ticker => {
    const coin = COIN_DATA[ticker];
    const px = priceCache[ticker] || {};
    const hasEtf = ETF_COINS.has(ticker);
    const hasPage = coin.slug && !['usdt','usdc','canton','shib','ton','ondo','near','bch','xlm','zec'].includes(coin.slug);

    const card = document.createElement(hasPage ? 'a' : 'div');
    if (hasPage) {
      card.href = `${coin.slug}-chart.html`;
    }
    card.className = 'coin-card';

    const chgClass = (px.chg || 0) >= 0 ? 'up' : 'down';
    const chgText  = px.chg != null ? (px.chg >= 0 ? '+' : '') + parseFloat(px.chg).toFixed(2) + '%' : '—';

    const sectorBadges = coin.sectors.map(s =>
      `<span class="coin-sector-badge ${s === sector ? 'current' : ''}">${s}</span>`
    ).join('');

    card.innerHTML = `
      <div class="coin-card-top">
        <div class="coin-dot" style="background:${coin.color}">${ticker.slice(0,2)}</div>
        <div>
          <div class="coin-card-name">${coin.name}</div>
          <div class="coin-card-ticker">${ticker} · ${coin.name_en}</div>
        </div>
        ${hasEtf ? '<span class="etf-badge" style="margin-left:auto">ETF ✓</span>' : ''}
      </div>
      <div class="coin-card-price">${fmtPrice(px.price)}</div>
      <span class="coin-card-chg ${chgClass}">${chgText}</span>
      <div class="coin-card-meta">
        <div class="coin-meta-item">
          <div class="coin-meta-label">24H 거래대금</div>
          <div class="coin-meta-value">${fmtVol(px.vol)}</div>
        </div>
        <div class="coin-meta-item">
          <div class="coin-meta-label">섹터 수</div>
          <div class="coin-meta-value">${coin.sectors.length}개</div>
        </div>
      </div>
      <div class="coin-sectors">${sectorBadges}</div>
    `;
    grid.appendChild(card);
  });
}

// ── 메인 ─────────────────────────────────────────────────
async function init() {
  try {
    await loadCoinData();
  } catch(e) {
    // coin_sectors.json 직접 로드 실패시 상대경로 재시도
    try {
      const r = await fetch('coin_sectors.json');
      COIN_DATA = await r.json();
    } catch(e2) {
      document.getElementById('coinGrid').innerHTML = '<div class="loading-msg">데이터 로드 실패</div>';
      return;
    }
  }

  const sector = getSectorFromUrl();
  currentSector = sector;

  // 해당 섹터 코인 필터
  const coins = Object.keys(COIN_DATA).filter(t => COIN_DATA[t].sectors.includes(sector));

  renderTabs(sector);
  renderHero(sector, coins);

  // 가격 로드 후 카드 렌더
  document.getElementById('coinGrid').innerHTML = '<div class="loading-msg">가격 데이터 불러오는 중...</div>';
  await fetchPrices(coins);
  renderCards(sector, coins);
}

init();
</script>
</body>
</html>
