<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하이퍼리퀴드 마켓 오버뷰 — 블록미디어</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── 마켓랩 공통 변수 ── */
:root{
  --bg:#ffffff; --card:#fbfbfb; --ink:#2b2b2b; --ink2:#444444; --ink3:#999999;
  --line:#e2e2e2; --line2:#f7f7f7;
  --main:#337abd; --main-rgb:51,122,189;
  --up:#1a7a4a; --up-bg:rgba(26,122,74,.08);
  --down:#e03131; --down-bg:rgba(224,49,49,.08);
  --amber:#d97706; --amber-bg:#fef3e2;
  --r:10px; --shadow:0 4px 16px rgba(50,50,93,.08),0 1px 3px rgba(0,0,0,.04);
  --font:"Noto Sans KR",system-ui,sans-serif;
  --mono:Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink2);font-family:var(--font);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── 헤더 ── */
.header{
  background:rgba(255,255,255,.92);border-bottom:1px solid var(--line);
  padding:0 16px;height:56px;position:sticky;top:0;z-index:100;
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;
}
.header-left{display:flex;align-items:center;gap:10px}
.header-left .logo-sq{width:8px;height:8px;background:var(--main);border-radius:2px;transform:rotate(45deg)}
.header-left .title{font-size:15px;font-weight:800;color:#161616;letter-spacing:.01em}
.header-left .sub{font-size:11px;font-weight:600;color:var(--ink3);background:var(--line2);padding:2px 8px;border-radius:99px}
.header-right{display:flex;align-items:center;gap:10px}
.live-pill{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--up);padding:3px 10px;border-radius:99px;background:var(--up-bg)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--up);animation:pulse-ring 2s ease-in-out infinite}
@keyframes pulse-ring{0%,100%{opacity:1}50%{opacity:.3}}
.update-time{font-size:11px;color:var(--ink3);font-family:var(--mono)}

/* ── 탭 ── */
.tabs{background:var(--bg);border-bottom:1px solid var(--line);display:flex;padding:0 16px}
.tab-btn{padding:11px 16px;font-size:13px;font-family:var(--font);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;color:var(--ink3);font-weight:500;margin-bottom:-1px;transition:all .15s}
.tab-btn.active{color:var(--main);border-bottom-color:var(--main);font-weight:700}
.tab-badge{font-size:10px;background:var(--line2);color:var(--ink3);padding:1px 6px;border-radius:4px;margin-left:5px;font-weight:600}
.tab-btn.active .tab-badge{background:rgba(var(--main-rgb),.1);color:var(--main)}

/* ── 컨테이너 ── */
.container{padding:14px 16px 56px;max-width:100%}

/* ── 카드 ── */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:12px}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px 14px 12px;position:relative;overflow:hidden}
.kpi-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.kpi-label{font-size:11px;font-weight:600;color:var(--ink2);margin-bottom:6px;letter-spacing:.01em}
.kpi-value{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--ink);line-height:1.1}
.kpi-note{font-size:11px;color:var(--ink3);margin-top:4px}

/* ── 마켓 테이블 ── */
.market-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.market-title{font-size:15px;font-weight:700;color:var(--ink);padding:14px 16px 0}
.table-toolbar{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.search-wrap{position:relative}
.search-wrap input{
  width:100%;background:var(--line2);border:1px solid var(--line);
  border-radius:8px;color:var(--ink);font-size:13px;font-family:var(--font);
  padding:8px 12px 8px 30px;outline:none;transition:.15s;
}
.search-wrap input:focus{border-color:var(--main);background:#fff}
.search-wrap input::placeholder{color:var(--ink3)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:14px;pointer-events:none}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.filt-btn{padding:5px 12px;border-radius:99px;font-size:12px;font-family:var(--font);cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink3);font-weight:600;transition:all .15s}
.filt-btn.active{border-color:var(--main);background:rgba(var(--main-rgb),.08);color:var(--main)}
.cat-btn{padding:5px 12px;border-radius:99px;font-size:12px;font-family:var(--font);cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink3);font-weight:600;transition:all .15s}
.cat-btn.active{border-color:#7c3aed;background:#f5f3ff;color:#7c3aed}
.tbl-count{margin-left:auto;font-size:11px;color:var(--ink3);font-family:var(--mono)}
.table-scroll{overflow-x:auto;border-top:1px solid var(--line);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:480px}
thead tr{background:var(--line2);border-bottom:1px solid var(--line)}
th{padding:9px 12px;font-size:11px;font-weight:600;color:var(--ink3);text-align:right;cursor:pointer;white-space:nowrap;user-select:none;transition:color .15s}
th:first-child{text-align:center;width:36px}
th:nth-child(2){text-align:left}
th.asc::after{content:' ↑';color:var(--main)}
th.desc::after{content:' ↓';color:var(--main)}
tbody tr{border-bottom:1px solid var(--line2);transition:background .1s}
tbody tr:hover{background:#f7f9fc}
tbody tr:last-child{border-bottom:none}
td{padding:10px 12px;text-align:right;font-family:var(--mono);font-size:12px;font-weight:600;white-space:nowrap;color:var(--ink)}
td:first-child{text-align:center;font-family:var(--font);color:var(--ink3);font-size:11px}
td:nth-child(2){text-align:left;font-family:var(--font)}
.coin-name{font-size:13px;font-weight:700;color:var(--ink)}
.coin-sub{font-size:10px;color:var(--ink3)}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;font-family:var(--mono)}
.badge-up{background:var(--up-bg);color:var(--up)}
.badge-dn{background:var(--down-bg);color:var(--down)}
.badge-warn{background:var(--amber-bg);color:var(--amber)}
.cat-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px}

/* ── 페이지네이션 ── */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--line)}
.page-btn{padding:6px 14px;border-radius:99px;border:1px solid var(--line);background:var(--card);color:var(--ink2);font-size:12px;font-family:var(--font);font-weight:600;cursor:pointer;transition:all .15s}
.page-btn:hover:not([disabled]){border-color:var(--main);color:var(--main)}
.page-btn[disabled]{opacity:.3;cursor:default;pointer-events:none}
.page-info{font-size:12px;color:var(--ink3);font-family:var(--mono)}

/* ── 섹션 카드 내부 ── */
.chart-wrap{padding:16px}
.sec-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px}
.sec-sub{font-size:11px;color:var(--ink3);margin-bottom:14px}

/* ── 히트맵 ── */
.hm-wrap{padding:16px}
.hm-legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.hm-legend-item{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--ink3)}
.hm-legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.hm-grid{display:flex;flex-wrap:wrap;gap:4px}
.hm-cell{border-radius:8px;cursor:default;transition:transform .15s,box-shadow .15s}
.hm-cell:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}

/* ── FR 리스트 ── */
.fr-list{padding:16px}
.fr-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line2)}
.fr-row:last-child{border-bottom:none}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo-sq"></span>
    <span class="title">하이퍼리퀴드 마켓</span>
    <span class="sub">블록미디어 마켓랩</span>
  </div>
  <div class="header-right">
    <div class="live-pill"><span class="live-dot"></span>LIVE</div>
    <div class="update-time" id="update-time">—</div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('crypto',this)">
    크립토 퍼페추얼 <span class="tab-badge" id="badge-crypto">—</span>
  </button>
  <button class="tab-btn" onclick="switchTab('hip3',this)">
    주식·지수·원자재 <span class="tab-badge" id="badge-hip3">HIP-3</span>
  </button>
</div>

<div class="container">

  <!-- KPI 2x2 -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-accent" style="background:#2563eb"></div>
      <div class="kpi-label">총 OI</div>
      <div class="kpi-value" id="k-oi">—</div>
      <div class="kpi-note">오픈 인터레스트</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-accent" style="background:#0ba360"></div>
      <div class="kpi-label">24h 거래량</div>
      <div class="kpi-value" id="k-vol">—</div>
      <div class="kpi-note">명목 거래량</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-accent" style="background:#d97706"></div>
      <div class="kpi-label">평균 펀딩비</div>
      <div class="kpi-value" id="k-fr">—</div>
      <div class="kpi-note" id="k-fr-note">연율화 기준</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-accent" style="background:#7c3aed"></div>
      <div class="kpi-label">마켓 수</div>
      <div class="kpi-value" id="k-cnt">—</div>
      <div class="kpi-note" id="k-cnt-note">퍼페추얼 페어</div>
    </div>
  </div>

  <!-- 전체 마켓 테이블 -->
  <div class="market-card">
    <div class="market-title">전체 마켓</div>
    <div class="table-toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search" placeholder="코인 검색..." oninput="applyFilters()">
      </div>
      <div class="filter-row">
        <button class="filt-btn active" onclick="setFilt('all',this)">전체</button>
        <button class="filt-btn toggle" onclick="toggleFilt('up',this)">상승</button>
        <button class="filt-btn toggle" onclick="toggleFilt('dn',this)">하락</button>
        <button class="filt-btn toggle" onclick="toggleFilt('highfr',this)">고펀딩</button>
        <button class="filt-btn toggle" onclick="toggleFilt('negfr',this)">음펀딩</button>
        <span class="tbl-count" id="tbl-count"></span>
      </div>
      <div class="filter-row" id="cat-row" style="display:none">
        <button class="cat-btn active" onclick="setCat('all',this)">전체</button>
        <button class="cat-btn" onclick="setCat('stock',this)">주식</button>
        <button class="cat-btn" onclick="setCat('index',this)">지수</button>
        <button class="cat-btn" onclick="setCat('commodity',this)">원자재</button>
      </div>
    </div>
    <div class="table-scroll">
      <table>
        <thead id="thead">
          <tr>
            <th>#</th>
            <th onclick="sortBy('coin')" data-col="coin">코인</th>
            <th onclick="sortBy('price')" data-col="price">가격</th>
            <th onclick="sortBy('chg')" data-col="chg">24H</th>
            <th onclick="sortBy('fr')" data-col="fr">펀딩비</th>
            <th onclick="sortBy('oi')" data-col="oi">OI</th>
            <th onclick="sortBy('vol')" data-col="vol">거래량</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text3)">
            데이터 불러오는 중...
          </td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <button class="page-btn" id="page-prev" onclick="changePage(-1)" disabled>← 이전</button>
      <span class="page-info" id="page-info">— / — 페이지</span>
      <button class="page-btn" id="page-next" onclick="changePage(1)" disabled>다음 →</button>
    </div>
  </div>

  <!-- 버블 차트 -->
  <div class="card chart-wrap">
    <div class="sec-title">OI 버블 차트</div>
    <div class="sec-sub">버블 크기 = OI · X축 = 펀딩비 · Y축 = 24h 변동률</div>
    <div style="position:relative;height:260px;width:100%">
      <canvas id="chart-bubble"></canvas>
    </div>
  </div>

  <!-- 히트맵 -->
  <div class="card hm-wrap">
    <div class="sec-title">펀딩비 히트맵</div>
    <div class="sec-sub">셀 크기 = OI 비례 · 색상 = 연율화 펀딩비</div>
    <div class="hm-legend">
      <div class="hm-legend-item"><div class="hm-legend-dot" style="background:#0a7c4a"></div>&gt;+20%</div>
      <div class="hm-legend-item"><div class="hm-legend-dot" style="background:#22a86b"></div>+5~20%</div>
      <div class="hm-legend-item"><div class="hm-legend-dot" style="background:#bbf7d0"></div>0~+5%</div>
      <div class="hm-legend-item"><div class="hm-legend-dot" style="background:#fecaca"></div>~0%</div>
      <div class="hm-legend-item"><div class="hm-legend-dot" style="background:#f87171"></div>-5~-20%</div>
      <div class="hm-legend-item"><div class="hm-legend-dot" style="background:#c0392b"></div>&lt;-20%</div>
    </div>
    <div class="hm-grid" id="heatmap"></div>
  </div>

  <!-- 펀딩비 주목 코인 -->
  <div class="card">
    <div class="chart-wrap" style="padding-bottom:0">
      <div class="sec-title">펀딩비 주목 코인</div>
      <div class="sec-sub">절댓값 상위 10개</div>
    </div>
    <div class="fr-list" id="fr-list" style="padding-top:0"></div>
  </div>

</div>

<script>
// ── 상수 ──
const CAT_META = {
  stock:     { label:'주식',   color:'#2563eb', bg:'#eff4ff' },
  index:     { label:'지수',   color:'#d97706', bg:'#fef3e2' },
  commodity: { label:'원자재', color:'#0ba360', bg:'#edf7f2' },
};
const HIP3_DEXES = ['xyz','cash','flx','km'];
const PAGE_SIZE = 20;

// ── 상태 ──
let cryptoData = [];
let hip3Data   = [];
let currentTab = 'crypto';
let sortCol    = 'vol';
let sortDir    = -1;
let filtModes  = new Set();
let catMode    = 'all';
let currentPage = 1;
let filteredSorted = [];
let bubbleChart = null;

// ── 유틸 ──
const fmtB = v => {
  if (!v || isNaN(v)) return '$0';
  if (v >= 1e9) return '$' + (v/1e9).toFixed(2) + 'B';
  if (v >= 1e6) return '$' + (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return '$' + (v/1e3).toFixed(0) + 'K';
  return '$' + v.toFixed(0);
};
const fmtPrice = v => {
  if (!v || isNaN(v)) return '—';
  if (v >= 10000) return '$' + v.toLocaleString('en-US', {maximumFractionDigits:0});
  if (v >= 100)   return '$' + v.toFixed(1);
  if (v >= 1)     return '$' + v.toFixed(3);
  return '$' + v.toPrecision(4);
};
const frColor = fr => {
  if (fr >  20)  return {bg:'#0a7c4a', fg:'#fff'};   // >+20% 연율
  if (fr >  5)   return {bg:'#22a86b', fg:'#fff'};   // +5~20%
  if (fr >= 0)   return {bg:'#d1fae5', fg:'#065f46'}; // 0~+5%
  if (fr > -5)   return {bg:'#fee2e2', fg:'#7f1d1d'}; // -5~0%
  if (fr > -20)  return {bg:'#f87171', fg:'#fff'};   // -20~-5%
  return                {bg:'#c0392b', fg:'#fff'};    // <-20%
};
const guessCategory = name => {
  const n = name.toUpperCase();
  if (['SPX','NDX','DJI','NIKKEI','DAX','FTSE','SP500','NAS100'].some(k=>n.includes(k))) return 'index';
  if (['GOLD','SILVER','XAU','XAG','OIL','WTI','NATGAS','BRENT','COPPER'].some(k=>n.includes(k))) return 'commodity';
  return 'stock';
};

// ── Fetch ──
async function fetchPerp(dex) {
  const body = dex ? {type:'metaAndAssetCtxs', dex} : {type:'metaAndAssetCtxs'};
  const res = await fetch('https://api.hyperliquid.xyz/info', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

function parseCtx(ctx, dex) {
  const universe = ctx[0]?.universe || [];
  const ctxList  = ctx[1] || [];
  return universe.map((coin, i) => {
    const c    = ctxList[i] || {};
    const mark = parseFloat(c.markPx  || 0);
    const prev = parseFloat(c.prevDayPx || mark);
    const chg  = prev > 0 ? (mark - prev) / prev * 100 : 0;
    const fr   = parseFloat(c.funding || 0) * 100 * 1095; // 연율화 (8h × 3 × 365)
    const oi   = parseFloat(c.openInterest || 0) * mark;
    const vol  = parseFloat(c.dayNtlVlm || 0);
    const cat  = dex ? guessCategory(coin.name) : null;
    // DEX 접두어 제거 (예: xyz:SPCX → SPCX)
    const coinName = coin.name.includes(':') ? coin.name.split(':')[1] : coin.name;
    return {coin: coinName, price: mark, prev, chg, fr, oi, vol, dex: dex||'', cat};
  }).filter(d => d.price > 0);
}

async function loadAll() {
  try {
    const [cryptoCtx, ...hip3Ctxs] = await Promise.all([
      fetchPerp(null),
      ...HIP3_DEXES.map(d => fetchPerp(d).catch(() => null))
    ]);

    cryptoData = parseCtx(cryptoCtx, '');
    hip3Data = [];
    HIP3_DEXES.forEach((dex, i) => {
      if (hip3Ctxs[i]) hip3Data.push(...parseCtx(hip3Ctxs[i], dex));
    });
    hip3Data = hip3Data.filter(d => d.vol > 0);

    document.getElementById('badge-crypto').textContent = cryptoData.length;
    document.getElementById('badge-hip3').textContent   = hip3Data.length || 'HIP-3';
    document.getElementById('update-time').textContent  =
      new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});

    updateKPI();
    applyFilters();
    renderBubble();
    renderHeatmap();
    renderFRList();

  } catch(e) {
    console.error('loadAll error:', e);
  }
}

function currentData() {
  return currentTab === 'crypto' ? cryptoData : hip3Data;
}

// ── KPI ──
function updateKPI() {
  const d = currentData();
  if (!d.length) return;
  const totalOI  = d.reduce((a,r) => a + r.oi,  0);
  const totalVol = d.reduce((a,r) => a + r.vol, 0);
  const avgFR    = d.reduce((a,r) => a + r.fr,  0) / d.length;

  document.getElementById('k-oi').textContent  = fmtB(totalOI);
  document.getElementById('k-vol').textContent = fmtB(totalVol);
  document.getElementById('k-cnt').textContent = d.length;
  document.getElementById('k-cnt-note').textContent = currentTab === 'hip3' ? 'HIP-3 마켓' : '퍼페추얼 페어';

  const frEl = document.getElementById('k-fr');
  frEl.textContent = (avgFR >= 0 ? '+' : '') + avgFR.toFixed(2) + '%';
  frEl.style.color = avgFR >= 0 ? 'var(--up)' : 'var(--down)';
  document.getElementById('k-fr-note').textContent = avgFR >= 0 ? '롱 포지션 우세' : '숏 포지션 우세';
}

// ── 버블 차트 ──
function renderBubble() {
  const d = currentData();
  if (!d.length) return;
  const maxOI = Math.max(...d.map(r => r.oi));

  const bubbleData = d.map(r => ({
    x: r.fr,
    y: r.chg,
    r: Math.max(4, Math.sqrt(r.oi / maxOI) * 32),
    coin: r.coin, oi: r.oi, fr: r.fr, chg: r.chg,
    color:  r.chg >= 0 ? 'rgba(26,122,74,0.45)'   : 'rgba(224,49,49,0.45)',
    border: r.chg >= 0 ? '#1a7a4a' : '#e03131',
  }));

  const canvas = document.getElementById('chart-bubble');
  if (bubbleChart) bubbleChart.destroy();
  bubbleChart = new Chart(canvas, {
    type: 'bubble',
    data: {
      datasets: [{
        data: bubbleData,
        backgroundColor: bubbleData.map(d => d.color),
        borderColor:     bubbleData.map(d => d.border),
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      clip: false,
      plugins: {
        legend: {display: false},
        tooltip: {
          callbacks: {
            label: ctx => {
              const d = ctx.raw;
              return [
                d.coin,
                '펀딩비: ' + (d.fr >= 0 ? '+' : '') + d.fr.toFixed(2) + '%',
                '24h: '   + (d.chg >= 0 ? '+' : '') + d.chg.toFixed(2) + '%',
                'OI: '    + fmtB(d.oi)
              ];
            }
          }
        }
      },
      scales: {
        x: {
          title: {display:true, text:'펀딩비 (%)', font:{size:10}, color:'#9098b1'},
          ticks: {
            callback: v => (typeof v === 'number' ? v.toFixed(3) : v) + '%',
            font:{size:9, family:'monospace'}, color:'#9098b1',
            maxTicksLimit: 8
          },
          grid:  {color:'#e4e7ed'}, border:{display:false}
        },
        y: {
          title: {display:true, text:'24h 변동률 (%)', font:{size:10}, color:'#9098b1'},
          ticks: {
            callback: v => (typeof v === 'number' ? v.toFixed(0) : v) + '%',
            font:{size:9, family:'monospace'}, color:'#9098b1',
            stepSize: 5, maxTicksLimit: 9
          },
          grid:  {color:'#e4e7ed'}, border:{display:false},
          min: -20, max: 20, beginAtZero: false
        }
      }
    }
  });
}

// ── 히트맵 ──
function renderHeatmap() {
  const d = currentData();
  if (!d.length) return;
  const top   = [...d].sort((a,b) => b.oi - a.oi).slice(0, currentTab === 'crypto' ? 25 : 20);
  const maxOI = Math.max(...top.map(r => r.oi));

  document.getElementById('heatmap').innerHTML = top.map(r => {
    const {bg, fg} = frColor(r.fr);
    const ratio = r.oi / maxOI;
    const minW  = ratio > 0.3 ? '120px' : ratio > 0.08 ? '88px' : '68px';
    const fs    = ratio > 0.3 ? 13 : ratio > 0.08 ? 12 : 11;
    const pad   = ratio > 0.3 ? '10px 12px' : ratio > 0.08 ? '8px 10px' : '6px 8px';
    const frTxt = (r.fr >= 0 ? '+' : '') + r.fr.toFixed(2) + '%';
    return `<div class="hm-cell" style="background:${bg};color:${fg};min-width:${minW};flex:1 1 ${minW};padding:${pad}"
      title="${r.coin} | FR: ${frTxt} | OI: ${fmtB(r.oi)}">
      <div style="font-size:${fs}px;font-weight:700;line-height:1.2">${r.coin}</div>
      <div style="font-size:${fs-1}px;font-family:var(--mono);opacity:.85;margin-top:2px">${frTxt}</div>
    </div>`;
  }).join('');
}

// ── 펀딩비 주목 코인 ──
function renderFRList() {
  const d = currentData();
  if (!d.length) return;
  const top10  = [...d].sort((a,b) => Math.abs(b.fr) - Math.abs(a.fr)).slice(0, 10);
  const maxAbs = Math.max(...top10.map(r => Math.abs(r.fr)));

  document.getElementById('fr-list').innerHTML = top10.map((r, i) => {
    const pct   = maxAbs > 0 ? Math.abs(r.fr) / maxAbs * 50 : 0; // 최대 50% (절반)
    const color = r.fr >= 0 ? '#0ba360' : '#e03a3a';
    const frTxt = (r.fr >= 0 ? '+' : '') + r.fr.toFixed(2) + '%';
    const catTag = r.cat && CAT_META[r.cat]
      ? `<span style="font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px;background:${CAT_META[r.cat].bg};color:${CAT_META[r.cat].color};flex-shrink:0">${CAT_META[r.cat].label}</span>` : '';
    // 음수: 왼쪽 바 / 양수: 오른쪽 바
    const barHtml = r.fr >= 0
      ? `<div style="width:50%;display:flex;justify-content:flex-end;align-items:center">
           <div style="width:${pct}%;height:6px;background:#e8f5f0;border-radius:2px;overflow:hidden">
             <div style="width:100%;height:100%;background:${color};border-radius:2px"></div>
           </div>
         </div>
         <div style="width:2px;height:16px;background:#d0d5de;flex-shrink:0"></div>
         <div style="width:50%"></div>`
      : `<div style="width:50%"></div>
         <div style="width:2px;height:16px;background:#d0d5de;flex-shrink:0"></div>
         <div style="width:50%;display:flex;justify-content:flex-start;align-items:center">
           <div style="width:${pct}%;height:6px;background:#fde8e8;border-radius:2px;overflow:hidden">
             <div style="width:100%;height:100%;background:${color};border-radius:2px"></div>
           </div>
         </div>`;
    return `<div class="fr-row">
      <span style="font-size:10px;color:var(--text3);width:16px;text-align:right;flex-shrink:0">${i+1}</span>
      <span style="font-size:13px;font-weight:700;width:50px;flex-shrink:0">${r.coin}</span>
      ${catTag}
      <span style="font-size:12px;font-family:var(--mono);color:${color};font-weight:700;width:72px;text-align:right;flex-shrink:0">${frTxt}</span>
      <div style="flex:1;display:flex;align-items:center;gap:0;min-width:0">${barHtml}</div>
    </div>`;
  }).join('');
}

// ── 테이블 ──
function applyFilters() {
  const q    = document.getElementById('search').value.trim().toUpperCase();
  let data   = currentData().filter(r => !q || r.coin.toUpperCase().includes(q));

  if (filtModes.has('up'))     data = data.filter(r => r.chg >= 0);
  if (filtModes.has('dn'))     data = data.filter(r => r.chg < 0);
  if (filtModes.has('highfr')) data = data.filter(r => r.fr > 5.475);
  if (filtModes.has('negfr'))  data = data.filter(r => r.fr < 0);
  if (currentTab === 'hip3' && catMode !== 'all') data = data.filter(r => r.cat === catMode);

  filteredSorted = [...data].sort((a,b) => {
    if (sortCol === 'coin') return sortDir * a.coin.localeCompare(b.coin);
    // sortDir=-1: 내림차순(b-a), sortDir=1: 오름차순(a-b)
    return sortDir === -1 ? b[sortCol] - a[sortCol] : a[sortCol] - b[sortCol];
  });

  currentPage = 1;
  renderTable();
}

function renderTable() {
  // 헤더 정렬 표시 (data-col 기반)
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.classList.remove('asc','desc');
    if (th.dataset.col === sortCol) th.classList.add(sortDir === 1 ? 'asc' : 'desc');
  });

  const total    = filteredSorted.length;
  const pages    = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > pages) currentPage = pages;
  const start    = (currentPage - 1) * PAGE_SIZE;
  const pageData = filteredSorted.slice(start, start + PAGE_SIZE);

  document.getElementById('tbl-count').textContent   = total + '/' + currentData().length;
  document.getElementById('page-info').textContent   = currentPage + ' / ' + pages + ' 페이지';
  document.getElementById('page-prev').disabled      = currentPage <= 1;
  document.getElementById('page-next').disabled      = currentPage >= pages;

  const isHip3   = currentTab === 'hip3';
  const colSpan  = isHip3 ? 8 : 7;

  if (!pageData.length) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="${colSpan}" style="text-align:center;padding:40px;color:var(--text3)">검색 결과 없음</td></tr>`;
    return;
  }

  document.getElementById('tbody').innerHTML = pageData.map((r, i) => {
    const rank = start + i + 1;
    const chgB = `<span class="badge badge-${r.chg>=0?'up':'dn'}">${r.chg>=0?'+':''}${r.chg.toFixed(2)}%</span>`;
    const frB  = `<span class="badge badge-${r.fr<0?'dn':r.fr>10?'warn':'up'}">${r.fr>=0?'+':''}${r.fr.toFixed(2)}%</span>`;
    const catCell = isHip3 && r.cat
      ? `<td><span class="cat-tag" style="background:${CAT_META[r.cat]?.bg};color:${CAT_META[r.cat]?.color}">${CAT_META[r.cat]?.label}</span></td>` : '';
    return `<tr>
      <td>${rank}</td>
      <td><div class="coin-name">${r.coin}</div><div class="coin-sub">PERP</div></td>
      ${catCell}
      <td>${fmtPrice(r.price)}</td>
      <td>${chgB}</td>
      <td>${frB}</td>
      <td>${fmtB(r.oi)}</td>
      <td>${fmtB(r.vol)}</td>
    </tr>`;
  }).join('');
}

function changePage(dir) {
  currentPage += dir;
  renderTable();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  applyFilters();
}

function setFilt(mode, btn) {
  filtModes.clear();
  document.querySelectorAll('.filt-btn.toggle').forEach(b => b.classList.remove('active'));
  document.querySelector('.filt-btn:not(.toggle)').classList.add('active');
  applyFilters();
}

function toggleFilt(mode, btn) {
  document.querySelector('.filt-btn:not(.toggle)').classList.remove('active');
  if (filtModes.has(mode)) {
    filtModes.delete(mode);
    btn.classList.remove('active');
  } else {
    filtModes.add(mode);
    btn.classList.add('active');
  }
  if (filtModes.size === 0) {
    document.querySelector('.filt-btn:not(.toggle)').classList.add('active');
  }
  applyFilters();
}

function setCat(mode, btn) {
  catMode = mode;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('cat-row').style.display = tab === 'hip3' ? 'flex' : 'none';
  document.getElementById('search').value = '';
  filtModes.clear();
  catMode = 'all';
  sortCol = 'vol';
  sortDir = -1;
  currentPage = 1;
  document.querySelectorAll('.filt-btn.toggle').forEach(b => b.classList.remove('active'));
  document.querySelector('.filt-btn:not(.toggle)').classList.add('active');
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.cat-btn').classList.add('active');

  // 헤더 재구성
  const isHip3 = tab === 'hip3';
  document.getElementById('thead').innerHTML = `<tr>
    <th>#</th>
    <th onclick="sortBy('coin')" data-col="coin">코인</th>
    ${isHip3 ? '<th>구분</th>' : ''}
    <th onclick="sortBy('price')" data-col="price">가격</th>
    <th onclick="sortBy('chg')" data-col="chg">24H</th>
    <th onclick="sortBy('fr')" data-col="fr">펀딩비</th>
    <th onclick="sortBy('oi')" data-col="oi">OI</th>
    <th onclick="sortBy('vol')" data-col="vol">거래량</th>
  </tr>`;

  updateKPI();
  applyFilters();
  renderBubble();
  renderHeatmap();
  renderFRList();
}

loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
