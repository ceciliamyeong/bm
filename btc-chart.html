<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비트코인 시세 | 블록미디어</title>
<meta name="description" content="비트코인 실시간 가격 차트와 최신 뉴스">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f7f7f5;
    --bg3: #f0efec;
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #9a9894;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --accent: #0f6e56;
    --up: #3B6D11;
    --up-bg: #EAF3DE;
    --down: #A32D2D;
    --down-bg: #FCEBEB;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --bg2: #1a1a18;
      --bg3: #222220;
      --text: #e8e7e3;
      --text2: #888780;
      --text3: #555450;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --accent: #1D9E75;
      --up: #9FE1CB;
      --up-bg: #0a2e20;
      --down: #F7C1C1;
      --down-bg: #2e0a0a;
    }
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  .site-header {
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .site-logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    text-decoration: none;
    letter-spacing: -0.02em;
  }
  .site-logo span { color: var(--accent); }
  .header-sep { width: 1px; height: 16px; background: var(--border2); }
  .site-nav {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-left: auto;
  }
  .nav-link {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    padding: 5px 10px;
    border-radius: 4px;
    text-decoration: none;
    color: var(--text2);
    transition: all 0.12s;
    white-space: nowrap;
  }
  .nav-link:hover { background: var(--bg2); color: var(--text); }
  .nav-link.active { background: var(--text); color: var(--bg); }

  /* ── LAYOUT ── */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem 1.5rem 3rem;
  }

  /* ── COIN HEADER ── */
  .coin-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .coin-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #F7931A;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .coin-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .coin-symbol {
    font-size: 13px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    margin-left: 4px;
  }
  .coin-price-wrap {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .coin-price {
    font-size: 28px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -0.03em;
  }
  .coin-change {
    font-size: 15px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 4px;
  }
  .coin-change.up { background: var(--up-bg); color: var(--up); }
  .coin-change.down { background: var(--down-bg); color: var(--down); }

  /* ── KPI STRIP ── */
  .kpi-strip {
    display: flex;
    gap: 0;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    margin-bottom: 1.25rem;
    overflow: hidden;
    flex-wrap: wrap;
  }
  .kpi-cell {
    padding: 0.75rem 1.25rem;
    border-right: 0.5px solid var(--border);
    min-width: 0;
  }
  .kpi-cell:last-child { border-right: none; }
  .kpi-label {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 3px;
    white-space: nowrap;
  }
  .kpi-value {
    font-size: 14px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }
  .kpi-value.up { color: var(--up); }
  .kpi-value.down { color: var(--down); }

  /* ── MAIN GRID ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 1.25rem;
    align-items: start;
  }

  /* ── CHART SECTION ── */
  .chart-section {}
  .chart-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .period-btn {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    padding: 4px 11px;
    border-radius: 4px;
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.12s;
  }
  .period-btn:hover { background: var(--bg3); color: var(--text); }
  .period-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .chart-wrap {
    position: relative;
    height: 360px;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg);
  }
  #lwChart { width: 100%; height: 100%; }
  .chart-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text3);
    background: var(--bg);
    z-index: 10;
  }
  .ohlc-bar {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text2);
    z-index: 20;
    pointer-events: none;
    line-height: 1.9;
    white-space: nowrap;
    background: var(--bg);
    padding: 2px 10px;
    border-radius: 4px;
    border: 0.5px solid var(--border);
    opacity: 0.92;
  }

  /* TV 배지 */
  .tv-badge {
    position: absolute;
    bottom: 10px;
    right: 12px;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 4px;
    text-decoration: none;
    color: var(--text2);
    z-index: 25;
    transition: all 0.15s;
  }
  .tv-badge:hover { background: var(--bg3); }
  .tv-badge-label {
    font-size: 9px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .tv-logo { height: 14px; width: auto; color: inherit; }

  /* 기간별 퍼포먼스 */
  .perf-row {
    display: flex;
    gap: 0;
    margin-top: 8px;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .perf-cell {
    flex: 1;
    padding: 8px 6px;
    text-align: center;
    border-right: 0.5px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  .perf-cell:last-child { border-right: none; }
  .perf-cell:hover { background: var(--bg2); }
  .perf-cell.active { background: var(--bg3); }
  .perf-cell-label {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text3);
    margin-bottom: 3px;
  }
  .perf-cell-val {
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
  }
  .perf-cell-val.up { color: var(--up); }
  .perf-cell-val.down { color: var(--down); }

  /* ── NEWS SIDEBAR ── */
  .news-sidebar {}
  .news-header {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid var(--text);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .news-header a {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    text-decoration: none;
    font-weight: 400;
  }
  .news-list { display: flex; flex-direction: column; gap: 0; }
  .news-item {
    display: flex;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
    text-decoration: none;
    color: var(--text);
    transition: background 0.1s;
  }
  .news-item:last-child { border-bottom: none; }
  .news-item:hover { color: var(--accent); }
  .news-thumb {
    width: 64px;
    height: 48px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--bg3);
  }
  .news-thumb-placeholder {
    width: 64px;
    height: 48px;
    border-radius: 4px;
    background: var(--bg3);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .news-body { flex: 1; min-width: 0; }
  .news-title {
    font-size: 12px;
    font-weight: 500;
    line-height: 1.45;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .news-date {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text3);
  }
  .news-loading {
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text3);
    padding: 1rem 0;
    text-align: center;
  }

  /* ── FOOTER ── */
  .page-footer {
    margin-top: 3rem;
    padding: 1.5rem 0;
    border-top: 0.5px solid var(--border);
    font-size: 11px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .footer-tv-logo {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    color: var(--text3);
    text-decoration: none;
  }
  .footer-tv-logo:hover { color: var(--text2); }
  .footer-tv-logo .tv-logo { height: 12px; width: auto; color: inherit; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
    .site-nav { display: none; }
  }
  @media (max-width: 640px) {
    .container { padding: 1rem 0.75rem 2rem; }
    .site-header { padding: 0 0.75rem; }
    .coin-price { font-size: 22px; }
    .chart-wrap { height: 260px; }
    .kpi-strip { display: grid; grid-template-columns: 1fr 1fr; }
    .kpi-cell { border-bottom: 0.5px solid var(--border); }
    .perf-row { display: grid; grid-template-columns: repeat(4, 1fr); }
    .tv-badge-label { display: none; }
  }

  /* ── ETF FLOW SECTION ── */
  .etf-section {
    margin-top: 2rem;
    border-top: 0.5px solid var(--border);
    padding-top: 1.5rem;
  }
  .etf-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .etf-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .etf-source {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text3);
  }
  .etf-kpi-row {
    display: flex;
    gap: 0;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 1rem;
  }
  .etf-kpi-cell {
    flex: 1;
    padding: 0.75rem 1.25rem;
    border-right: 0.5px solid var(--border);
  }
  .etf-kpi-cell:last-child { border-right: none; }
  .etf-kpi-label {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 3px;
  }
  .etf-kpi-value {
    font-size: 16px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }
  .etf-kpi-value.up   { color: var(--up); }
  .etf-kpi-value.down { color: var(--down); }
  .etf-kpi-date {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text3);
    margin-top: 2px;
  }
  .etf-chart-wrap {
    position: relative;
    height: 200px;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg);
    padding: 12px 12px 8px;
  }
  .etf-chart-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text3);
  }
  @media (max-width: 640px) {
    .etf-kpi-row { display: grid; grid-template-columns: 1fr 1fr; }
    .etf-kpi-cell { border-bottom: 0.5px solid var(--border); }
    .etf-chart-wrap { height: 160px; }
  }
</style>
</head>

<script>
const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

const C = {
  bg:      isDark ? '#111110' : '#ffffff',
  grid:    isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)',
  border:  isDark ? '#333331' : '#e0dfdb',
  text:    isDark ? '#666564' : '#9a9894',
  up:      '#3B6D11',
  down:    '#A32D2D',
  line:    isDark ? '#1D9E75' : '#0f6e56',
  fillTop: isDark ? 'rgba(29,158,117,0.18)' : 'rgba(15,110,86,0.10)',
  fillBot: 'rgba(0,0,0,0)',
};

let lwChart = null, mainSeries = null;
let currentInterval = '1m';
let currentLimit = 360;
let wsConn = null;

// ── 환율 fetch (키 없는 무료 API, 폴백 포함) ──────────────────
let cachedUsdKrw = 1480; // 초기 fallback

async function fetchUsdKrw() {
  try {
    const r = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
    const d = await r.json();
    if (d?.usd?.krw) { cachedUsdKrw = d.usd.krw; return d.usd.krw; }
  } catch(e) {}
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    const d = await r.json();
    if (d?.rates?.KRW) { cachedUsdKrw = d.rates.KRW; return d.rates.KRW; }
  } catch(e) {}
  return cachedUsdKrw;
}

// ── 가격 fetch ────────────────────────────────────────────────
async function fetchPrice() {
  try {
    const [binR, upbitR] = await Promise.allSettled([
      fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT'),
      fetch('https://api.upbit.com/v1/ticker?markets=KRW-BTC'),
    ]);

    let usdPrice = 0, chgPct = 0, high = 0, low = 0, vol = 0, krwPrice = 0;

    if (binR.status === 'fulfilled') {
      const d = await binR.value.json();
      usdPrice = parseFloat(d.lastPrice);
      chgPct   = parseFloat(d.priceChangePercent);
      high     = parseFloat(d.highPrice);
      low      = parseFloat(d.lowPrice);
      vol      = parseFloat(d.quoteVolume);
    }
    if (upbitR.status === 'fulfilled') {
      const d = await upbitR.value.json();
      krwPrice = d[0]?.trade_price || 0;
    }

    // 메인 가격
    document.getElementById('coinPrice').textContent = '$' + Math.round(usdPrice).toLocaleString();
    const chgEl = document.getElementById('coinChange');
    chgEl.textContent = (chgPct >= 0 ? '+' : '') + chgPct.toFixed(2) + '%';
    chgEl.className = 'coin-change ' + (chgPct >= 0 ? 'up' : 'down');
    chgEl.style.display = 'inline-block';

    // KPI
    document.getElementById('kpiKrw').textContent = (krwPrice/100000000).toFixed(2) + '억 원';
    document.getElementById('kpiHigh').textContent = '$' + Math.round(high).toLocaleString();
    document.getElementById('kpiLow').textContent  = '$' + Math.round(low).toLocaleString();
    document.getElementById('kpiVol').textContent  = vol >= 1e9 ? (vol/1e9).toFixed(1)+'B' : (vol/1e6).toFixed(0)+'M';

    // 김치 프리미엄
    if (usdPrice > 0 && krwPrice > 0) {
      const kimchi = ((krwPrice / (usdPrice * cachedUsdKrw)) - 1) * 100;
      const kEl = document.getElementById('kpiKimchi');
      kEl.textContent = (kimchi >= 0 ? '+' : '') + kimchi.toFixed(2) + '%';
      kEl.className = 'kpi-value ' + (kimchi >= 0 ? 'up' : 'down');
    }

  } catch(e) { console.error(e); }
}

// ── 퍼포먼스 fetch ────────────────────────────────────────────
async function fetchPerformance() {
  try {
    const now = Date.now();
    const intervals = {
      '1d':   { interval: '1h',  startMs: now - 86400000 },
      '7d':   { interval: '1d',  startMs: now - 7*86400000 },
      '30d':  { interval: '1d',  startMs: now - 30*86400000 },
      '180d': { interval: '1d',  startMs: now - 180*86400000 },
      '1y':   { interval: '1w',  startMs: now - 365*86400000 },
      '5y':   { interval: '1w',  startMs: now - 5*365*86400000 },
    };

    const currentPriceEl = document.getElementById('coinPrice').textContent;
    const currentPrice = parseFloat(currentPriceEl.replace(/[$,]/g, ''));
    if (!currentPrice) return;

    // YTD
    const ytdStart = new Date(new Date().getFullYear(), 0, 1).getTime();
    const ytdFetch = fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&startTime=${ytdStart}&limit=1`);

    // 전체 (2017-08 기준)
    const allStart = new Date('2017-08-01').getTime();
    const allFetch = fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1w&startTime=${allStart}&limit=1`);

    const perfKeys = ['1d','7d','30d','180d','1y','5y'];
    const fetches = perfKeys.map(k =>
      fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=${intervals[k].interval}&startTime=${intervals[k].startMs}&limit=1`)
    );

    const [ytdRes, allRes, ...perfRes] = await Promise.all([ytdFetch, allFetch, ...fetches]);

    const calcPerf = async (res, id) => {
      try {
        const d = await res.json();
        if (!d || !d[0]) return;
        const openPrice = parseFloat(d[0][1]);
        const pct = ((currentPrice - openPrice) / openPrice) * 100;
        const el = document.getElementById(id);
        if (el) {
          el.textContent = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
          el.className = 'perf-cell-val ' + (pct >= 0 ? 'up' : 'down');
        }
      } catch(e) {}
    };

    await Promise.all([
      calcPerf(ytdRes, 'perfYtd'),
      calcPerf(allRes, 'perfAll'),
      ...perfRes.map((r, i) => calcPerf(r, 'perf' + ['1d','7d','30d','180d','1y','5y'][i].replace('d','d').replace('y','y'))),
    ]);

  } catch(e) { console.error(e); }
}

// ── 차트 init ─────────────────────────────────────────────────
function initChart() {
  const wrap = document.getElementById('lwChart');
  lwChart = LightweightCharts.createChart(wrap, {
    width: wrap.clientWidth,
    height: wrap.clientHeight || 360,
    layout: { background: { color: C.bg }, textColor: C.text, fontFamily: "'JetBrains Mono', monospace", fontSize: 11 },
    grid: { vertLines: { color: C.grid }, horzLines: { color: C.grid } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: C.border },
    timeScale: { borderColor: C.border, timeVisible: true },
    handleScroll: true,
    handleScale: true,
  });

  lwChart.subscribeCrosshairMove(p => {
    const bar = document.getElementById('ohlcBar');
    if (!p || !p.time || !mainSeries) { bar.innerHTML = ''; return; }
    const sd = p.seriesData?.get(mainSeries);
    if (!sd) return;
    const dt = new Date(p.time * 1000);
    const dateStr = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    if (sd.open !== undefined) {
      bar.innerHTML = `<span style="color:var(--text3)">${dateStr}</span>&nbsp; O&nbsp;<b>$${Math.round(sd.open).toLocaleString()}</b>&nbsp;H&nbsp;<b style="color:#3B6D11">$${Math.round(sd.high).toLocaleString()}</b>&nbsp;L&nbsp;<b style="color:#A32D2D">$${Math.round(sd.low).toLocaleString()}</b>&nbsp;C&nbsp;<b>$${Math.round(sd.close).toLocaleString()}</b>`;
    } else {
      bar.innerHTML = `<span style="color:var(--text3)">${dateStr}</span>&nbsp; <b>$${Math.round(sd.value).toLocaleString()}</b>`;
    }
  });

  window.addEventListener('resize', () => {
    lwChart.applyOptions({ width: wrap.clientWidth, height: wrap.clientHeight });
  });
}

async function loadChart(interval, limit, days) {
  document.getElementById('chartLoading').style.display = 'flex';
  try {
    let url;
    if (days === 'max') {
      url = `https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=${interval}&startTime=${new Date('2017-08-01').getTime()}&limit=1000`;
    } else {
      const startMs = Date.now() - days * 86400000;
      url = `https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=${interval}&startTime=${startMs}&limit=${limit}`;
    }

    const raw = await (await fetch(url)).json();
    const data = raw.map(d => ({
      time:  Math.floor(d[0] / 1000),
      open:  parseFloat(d[1]),
      high:  parseFloat(d[2]),
      low:   parseFloat(d[3]),
      close: parseFloat(d[4]),
    })).sort((a,b) => a.time - b.time);

    if (!lwChart) initChart();
    if (mainSeries) { try { lwChart.removeSeries(mainSeries); } catch(e){} }

    // 1일(1분봉)은 라인, 나머지는 캔들
    if (interval === '1m') {
      mainSeries = lwChart.addAreaSeries({
        lineColor: C.line, topColor: C.fillTop, bottomColor: C.fillBot,
        lineWidth: 1.5, priceLineVisible: false,
      });
      mainSeries.setData(data.map(d => ({ time: d.time, value: d.close })));
    } else {
      mainSeries = lwChart.addCandlestickSeries({
        upColor: C.up, downColor: C.down,
        borderUpColor: C.up, borderDownColor: C.down,
        wickUpColor: C.up, wickDownColor: C.down,
        priceLineVisible: false,
      });
      mainSeries.setData(data);
    }

    lwChart.timeScale().fitContent();
    document.getElementById('chartLoading').style.display = 'none';
  } catch(e) {
    document.getElementById('chartLoading').textContent = '데이터를 불러올 수 없습니다.';
  }
}

// ── 뉴스 fetch ────────────────────────────────────────────────
function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 3600)  return Math.floor(diff/60) + '분 전';
  if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
  return Math.floor(diff/86400) + '일 전';
}

async function fetchNews() {
  const list = document.getElementById('newsList');
  try {
    const r = await fetch('https://www.blockmedia.co.kr/wp-json/wp/v2/posts?coin_tag=56514,56551&per_page=10&orderby=date&_fields=id,title,link,date,featured_media,_links&_embed=wp:featuredmedia');
    const posts = await r.json();

    if (!posts || !posts.length) {
      list.innerHTML = '<div class="news-loading">뉴스가 없습니다.</div>';
      return;
    }

    list.innerHTML = '';
    posts.forEach(post => {
      const item = document.createElement('a');
      item.className = 'news-item';
      item.href = post.link;
      item.target = '_blank';
      item.rel = 'noopener';

      // 썸네일
      const thumb = post._embedded?.['wp:featuredmedia']?.[0]?.source_url;
      const imgEl = thumb
        ? `<img class="news-thumb" src="${thumb}" alt="" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="news-thumb-placeholder">₿</div>`;

      const titleText = post.title?.rendered?.replace(/&#\d+;/g, c => String.fromCharCode(c.match(/\d+/)[0])) || '';

      item.innerHTML = `
        ${imgEl}
        <div class="news-body">
          <div class="news-title">${titleText}</div>
          <div class="news-date">${timeAgo(post.date)}</div>
        </div>`;
      list.appendChild(item);
    });
  } catch(e) {
    list.innerHTML = '<div class="news-loading">뉴스를 불러올 수 없습니다.</div>';
  }
}

// ── 컨트롤 ────────────────────────────────────────────────────
document.querySelectorAll('.period-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));

    const interval = this.dataset.interval;
    const limit    = parseInt(this.dataset.limit);
    const days     = this.dataset.days === 'max' ? 'max' : parseInt(this.dataset.days);
    loadChart(interval, limit, days);
  });
});

// ── INIT ──────────────────────────────────────────────────────
fetchUsdKrw().then(() => fetchPrice());
loadChart('1m', 360, 1);
fetchNews();

// 1시간마다 환율 갱신
setInterval(fetchUsdKrw, 3600000);
// 30초마다 가격 갱신
setInterval(fetchPrice, 30000);
// 5분마다 뉴스 갱신
setInterval(fetchNews, 300000);
// 가격 로드 후 퍼포먼스 계산
setTimeout(fetchPerformance, 1500);
</script>
