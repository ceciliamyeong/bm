// ── 유틸 ──────────────────────────────────────────────────
function fmtPrice(p) {
  if (!p || isNaN(p)) return '—';
  if (p >= 1000) return '$' + Math.round(p).toLocaleString();
  if (p >= 1)    return '$' + parseFloat(p).toFixed(2);
  if (p >= 0.01) return '$' + parseFloat(p).toFixed(4);
  return '$' + parseFloat(p).toFixed(6);
}
function fmtVol(v) {
  if (!v || isNaN(v)) return '—';
  if (v >= 1e9) return '$' + (v/1e9).toFixed(1) + 'B';
  if (v >= 1e6) return '$' + (v/1e6).toFixed(0) + 'M';
  return '$' + (v/1e3).toFixed(0) + 'K';
}

// ── URL 파라미터 ──────────────────────────────────────────
function getSectorFromUrl() {
  const p = new URLSearchParams(window.location.search);
  return p.get('sector') || 'Layer1';
}

// ── coin_sectors.json 로드 ────────────────────────────────
async function loadCoinData() {
  const r = await fetch('data/coin_sectors.json');
  COIN_DATA = await r.json();
}

// ── SEO 메타 동적 업데이트 ───────────────────────────────
function updateSeoMeta(sector, coins) {
  const meta   = SECTOR_META[sector] || { icon: '📊', desc: '', seo: '' };
  const title  = `${sector} 섹터 코인 ${coins.length}개 · 실시간 시세 | 블록미디어`;
  const desc   = `${sector} 섹터 ${coins.length}개 코인 실시간 시세를 블록미디어에서 확인하세요. ${meta.desc}`;
  const url    = `https://data.blockmedia.co.kr/sector.html?sector=${encodeURIComponent(sector)}`;

  document.title = title;
  document.getElementById('metaDesc').content   = desc;
  document.getElementById('canonicalUrl').href  = url;
  document.getElementById('ogTitle').content    = title;
  document.getElementById('ogDesc').content     = desc;
  document.getElementById('ogUrl').content      = url;
  document.getElementById('twTitle').content    = title;
  document.getElementById('twDesc').content     = desc;

  // JSON-LD BreadcrumbList + ItemList
  const coinItems = coins.slice(0, 10).map((ticker, i) => {
    const c = COIN_DATA[ticker];
    return {
      '@type': 'ListItem',
      position: i + 1,
      name: `${c.name} (${ticker})`,
      url: c.slug ? `https://data.blockmedia.co.kr/coins/${c.slug}-chart.html` : `https://data.blockmedia.co.kr/sector.html?sector=${encodeURIComponent(sector)}`,
    };
  });

  const jsonLd = {
    '@context': 'https://schema.org',
    '@graph': [
      {
        '@type': 'WebPage',
        '@id': url,
        url,
        name: title,
        description: desc,
        inLanguage: 'ko-KR',
        publisher: { '@type': 'Organization', name: '블록미디어', url: 'https://www.blockmedia.co.kr' },
      },
      {
        '@type': 'BreadcrumbList',
        itemListElement: [
          { '@type': 'ListItem', position: 1, name: '블록미디어', item: 'https://www.blockmedia.co.kr' },
          { '@type': 'ListItem', position: 2, name: '마켓랩', item: 'https://data.blockmedia.co.kr' },
          { '@type': 'ListItem', position: 3, name: `${sector} 섹터`, item: url },
        ],
      },
      {
        '@type': 'ItemList',
        name: `${sector} 섹터 코인`,
        description: meta.desc,
        numberOfItems: coins.length,
        itemListElement: coinItems,
      },
    ],
  };
  document.getElementById('jsonLd').textContent = JSON.stringify(jsonLd);
}

// ── 섹터 탭 렌더 ─────────────────────────────────────────
function renderTabs(activeSector) {
  const allSectors = new Set();
  Object.values(COIN_DATA).forEach(c => c.sectors.forEach(s => allSectors.add(s)));
  const tabs = document.getElementById('sectorTabs');
  tabs.innerHTML = '';
  [...allSectors].sort().forEach(sector => {
    const a = document.createElement('a');
    a.className = 'sector-tab' + (sector === activeSector ? ' active' : '');
    a.href = `sector.html?sector=${encodeURIComponent(sector)}`;
    const meta = SECTOR_META[sector] || {};
    a.textContent = (meta.icon || '•') + ' ' + sector;
    tabs.appendChild(a);
  });
}

// ── 섹터 히어로 렌더 ─────────────────────────────────────
function renderHero(sector, coins) {
  const meta = SECTOR_META[sector] || { icon: '📊', desc: '' };
  document.getElementById('sectorPillText').textContent = meta.icon + ' 섹터 분류';
  document.getElementById('sectorNameText').textContent = sector;
  document.getElementById('sectorNameAccent').textContent = coins.length + '개 코인';
  document.getElementById('sectorDesc').textContent = meta.desc;
}

// ── SEO 텍스트 섹션 렌더 ─────────────────────────────────
function renderSeoSection(sector, coins) {
  const meta = SECTOR_META[sector] || {};
  if (!meta.seo) return;
  const coinNames = coins.slice(0, 5).map(t => `${COIN_DATA[t]?.name}(${t})`).join(', ');
  const el = document.getElementById('seoSection');
  el.innerHTML = `
    <h2>${sector} 섹터란?</h2>
    <p>${meta.seo}</p>
    <p>현재 ${sector} 섹터에는 ${coins.length}개 코인이 포함되어 있으며, 대표 코인으로는 ${coinNames} 등이 있습니다. 각 코인의 실시간 시세, 24시간 거래대금, 등락률을 블록미디어에서 확인하세요.</p>
  `;
}

// ── 가격 fetch (Binance / MEXC / Bybit) ──────────────────
async function fetchPrices(tickers) {
  const stables    = new Set(['USDT','USDC']);
  const MEXC_ONLY  = new Set([]);
  const BYBIT_ONLY = new Set(['HYPE', 'CC']);

  const toFetch      = tickers.filter(t => !stables.has(t) && !MEXC_ONLY.has(t) && !BYBIT_ONLY.has(t) && !priceCache[t]);
  const toFetchMexc  = tickers.filter(t => MEXC_ONLY.has(t)  && !priceCache[t]);
  const toFetchBybit = tickers.filter(t => BYBIT_ONLY.has(t) && !priceCache[t]);

  // Binance
  if (toFetch.length > 0) {
    const symbols = JSON.stringify(toFetch.map(t => t + 'USDT'));
    try {
      const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=${encodeURIComponent(symbols)}`);
      const data = await r.json();
      data.forEach(d => {
        const ticker = d.symbol.replace('USDT','');
        priceCache[ticker] = { price: parseFloat(d.lastPrice), chg: parseFloat(d.priceChangePercent), vol: parseFloat(d.quoteVolume) };
      });
    } catch(e) { console.error('Binance fetch error', e); }
  }

  // MEXC
  for (const t of toFetchMexc) {
    try {
      const r = await fetch(`https://api.mexc.com/api/v3/ticker/24hr?symbol=${t}USDT`);
      const d = await r.json();
      priceCache[t] = { price: parseFloat(d.lastPrice), chg: parseFloat(d.priceChangePercent), vol: parseFloat(d.quoteVolume) };
    } catch(e) { console.error('MEXC fetch error', e); }
  }

  // Bybit
  for (const t of toFetchBybit) {
    try {
      const r = await fetch(`https://api.bybit.com/v5/market/tickers?category=spot&symbol=${t}USDT`);
      const d = await r.json();
      const tk = d?.result?.list?.[0];
      if (tk) {
        const prev = parseFloat(tk.prevPrice24h);
        const last = parseFloat(tk.lastPrice);
        priceCache[t] = { price: last, chg: prev > 0 ? ((last - prev) / prev) * 100 : 0, vol: parseFloat(tk.turnover24h) };
      }
    } catch(e) { console.error('Bybit fetch error', e); }
  }

  stables.forEach(t => {
    if (!priceCache[t]) priceCache[t] = { price: 1.0, chg: 0, vol: 0 };
  });
}

// ── 코인 카드 렌더 ───────────────────────────────────────
function renderCards(sector, coins) {
  const grid = document.getElementById('coinGrid');
  grid.innerHTML = '';

  if (coins.length === 0) {
    grid.innerHTML = '<div class="loading-msg">해당 섹터에 코인이 없습니다.</div>';
    return;
  }

  coins.sort((a, b) => (priceCache[b]?.vol || 0) - (priceCache[a]?.vol || 0));

  coins.forEach(ticker => {
    const coin   = COIN_DATA[ticker];
    const px     = priceCache[ticker] || {};
    const hasEtf = ETF_COINS.has(ticker);
    const hasPage = coin.slug && !['usdt','usdc','canton','shib','ton','ondo','near','bch'].includes(coin.slug);

    const card = document.createElement(hasPage ? 'a' : 'div');
    if (hasPage) card.href = `coins/${coin.slug}-chart.html`;
    card.className = 'coin-card';

    const chgClass = (px.chg || 0) >= 0 ? 'up' : 'down';
    const chgText  = px.chg != null ? (px.chg >= 0 ? '+' : '') + parseFloat(px.chg).toFixed(2) + '%' : '—';

    const sectorBadges = coin.sectors.map(s =>
      `<span class="coin-sector-badge ${s === sector ? 'current' : ''}">${s}</span>`
    ).join('');

    card.innerHTML = `
      <div class="coin-card-top">
        <div class="coin-dot" style="background:${coin.color}">${ticker.slice(0,2)}</div>
        <div>
          <div class="coin-card-name">${coin.name}</div>
          <div class="coin-card-ticker">${ticker} · ${coin.name_en}</div>
        </div>
        ${hasEtf ? '<span class="etf-badge" style="margin-left:auto">ETF ✓</span>' : ''}
      </div>
      <div class="coin-card-price">${fmtPrice(px.price)}</div>
      <span class="coin-card-chg ${chgClass}">${chgText}</span>
      <div class="coin-card-meta">
        <div class="coin-meta-item">
          <div class="coin-meta-label">24H 거래대금</div>
          <div class="coin-meta-value">${fmtVol(px.vol)}</div>
        </div>
        <div class="coin-meta-item">
          <div class="coin-meta-label">섹터 수</div>
          <div class="coin-meta-value">${coin.sectors.length}개</div>
        </div>
      </div>
      <div class="coin-sectors">${sectorBadges}</div>
    `;
    grid.appendChild(card);
  });
}

// ── 메인 ─────────────────────────────────────────────────
async function init() {
  try {
    await loadCoinData();
  } catch(e) {
    try {
      const r = await fetch('data/coin_sectors.json');
      COIN_DATA = await r.json();
    } catch(e2) {
      document.getElementById('coinGrid').innerHTML = '<div class="loading-msg">데이터 로드 실패</div>';
      return;
    }
  }

  const sector = getSectorFromUrl();
  currentSector = sector;

  const coins = Object.keys(COIN_DATA).filter(t => COIN_DATA[t].sectors.includes(sector));

  updateSeoMeta(sector, coins);
  renderHero(sector, coins);
  renderTabs(sector);
  renderSeoSection(sector, coins);

  document.getElementById('coinGrid').innerHTML = '<div class="loading-msg">가격 데이터 불러오는 중...</div>';
  await fetchPrices(coins);
  renderCards(sector, coins);
}

init();
</script>
