name: Cleanup BM20 History (1회용)

on:
  workflow_dispatch:  # 수동 실행 전용

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run cleanup
        run: python scripts/cleanup_bm20_history.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/bm20_history.json data/bm20_history.backup.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: cleanup bm20_history.json 중복 제거"
            git push
          else
            echo "No changes"
          fi
