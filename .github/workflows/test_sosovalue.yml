name: Test SoSoValue API

on:
  workflow_dispatch:  # 수동 실행

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Test SoSoValue ETF Endpoints
        env:
          SOSOVALUE_API_KEY: ${{ secrets.SOSOVALUE_API_KEY }}
        run: |
          echo "=============================="
          echo "BTC ETF Current Metrics"
          echo "=============================="
          curl -s -w "\nHTTP Status: %{http_code}\n" \
            -X POST "https://api.sosovalue.xyz/openapi/v2/etf/currentEtfDataMetrics" \
            -H "x-soso-api-key: $SOSOVALUE_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"type": "us-btc-spot"}' | head -c 800
          echo ""

          echo "=============================="
          echo "ETH ETF Current Metrics"
          echo "=============================="
          curl -s -w "\nHTTP Status: %{http_code}\n" \
            -X POST "https://api.sosovalue.xyz/openapi/v2/etf/currentEtfDataMetrics" \
            -H "x-soso-api-key: $SOSOVALUE_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"type": "us-eth-spot"}' | head -c 800
          echo ""

          echo "=============================="
          echo "BTC ETF Historical Inflow (최근 데이터)"
          echo "=============================="
          curl -s -w "\nHTTP Status: %{http_code}\n" \
            -X POST "https://api.sosovalue.xyz/openapi/v2/etf/historicalInflowChart" \
            -H "x-soso-api-key: $SOSOVALUE_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"type": "us-btc-spot"}' | head -c 800
          echo ""

          echo "=============================="
          echo "ETH ETF Historical Inflow (최근 데이터)"
          echo "=============================="
          curl -s -w "\nHTTP Status: %{http_code}\n" \
            -X POST "https://api.sosovalue.xyz/openapi/v2/etf/historicalInflowChart" \
            -H "x-soso-api-key: $SOSOVALUE_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"type": "us-eth-spot"}' | head -c 800
          echo ""
