name: Backfill Korea Daily (1회용)

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas

      - name: Run backfill
        run: python scripts/backfill_korea_daily.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add out/history/korea_daily.csv
          if ! git diff --cached --quiet; then
            git commit -m "chore: backfill korea_daily.csv (60일치)"
            git push
          else
            echo "No changes"
          fi
