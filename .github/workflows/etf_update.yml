name: Update ETF Data

on:
  schedule:
    - cron: '0 4,5,6 * * *'  # KST 13:00 / 14:00 / 15:00
  workflow_dispatch:               # 수동 실행도 가능

jobs:
  fetch-etf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch ETF data
        env:
          SOSOVALUE_API_KEY: ${{ secrets.SOSOVALUE_API_KEY }}
        run: python scripts/fetch_etf.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/etf_*.json
          git diff --cached --quiet && echo "[skip] 변경 없음" || (
            git commit -m "[skip ci] Update ETF data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          )
