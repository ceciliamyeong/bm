name: BM20 Daily_latest

on:
  schedule:
    - cron: "0 22 * * *"    # 07:00 KST (UTC 22:00)
    
  workflow_dispatch:
    inputs:
      target_date:
        description: "Publish from this archive date (YYYY-MM-DD). Leave empty to use latest available."
        required: false
        default: ""

concurrency:
  group: bm20-daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # index.html / archive / latest.html 커밋용

    env:
      TZ: Asia/Seoul
      COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
      CMC_API_KEY: ${{ secrets.CMC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Korean fonts (Nanum + Noto CJK)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum fonts-noto-cjk fontconfig
          sudo fc-cache -f -v

      # 1) 리포트 생성 (out/YYYY-MM-DD)
      - name: Run BM20 generator (with retries)
        shell: bash
        env:
          OUT_DIR: out
          TZ: Asia/Seoul
          BM20_KRW_BONUS: "1.0"
          BM20_DAILY_SNAPSHOT: "1"  # <--- 이 줄을 반드시 추가해야 기록이 업데이트됩니다!
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          MAX_ATTEMPTS: "3"
          RETRY_SLEEP_SECONDS: "45"
        run: |
          chmod +x scripts/run_bm20.sh
          scripts/run_bm20.sh

      # 1.5) daily CSV로 오늘 ret 계산 → out/backfill_current_basket.csv에 append
      #      (BM20 연속지수 SSOT를 오늘 산출물로 확실히 전진시켜서, 이후 generate_report.py 리빌드가 최신을 보게 함)
      - name: Update backfill SSOT from daily CSV
        shell: bash
        run: |
          set -euo pipefail

          # out/YYYY-MM-DD 폴더에서 가장 최신 날짜 선택
          DATE=$(ls -1 out 2>/dev/null | grep -E "^[0-9]{4}-[0-9]{2}-[0-9]{2}$" | sort | tail -n 1 || true)
          if [ -z "${DATE:-}" ]; then
            echo "[WARN] No out/YYYY-MM-DD folder found. Skip backfill update."
            exit 0
          fi

          CSV="out/${DATE}/bm20_daily_data_${DATE}.csv"
          BACKFILL="out/backfill_current_basket.csv"

          echo "[INFO] DATE=$DATE"
          echo "[INFO] CSV=$CSV"
          echo "[INFO] BACKFILL=$BACKFILL"

          if [ ! -f "$CSV" ]; then
            echo "[WARN] Missing $CSV. Skip backfill update."
            exit 0
          fi

          if [ ! -f "$BACKFILL" ]; then
            echo "[WARN] Missing $BACKFILL. Cannot compute index. Skip."
            exit 0
          fi

          export DATE CSV BACKFILL
          python - << 'PY'
          import csv
          import os
          from pathlib import Path

          date = os.environ["DATE"]
          csv_path = Path(os.environ["CSV"])
          backfill_path = Path(os.environ["BACKFILL"])

          # 1) 오늘 포트폴리오 1D 수익률 = Σ(weight_ratio * price_change_pct/100)
          rows = list(csv.DictReader(csv_path.open(encoding="utf-8")))
          if not rows:
              print("[backfill] daily CSV empty; skip")
              raise SystemExit(0)

          ret = 0.0
          for r in rows:
              w = r.get("weight_ratio")
              pct = r.get("price_change_pct")
              if w in (None, "") or pct in (None, ""):
                  continue
              ret += float(w) * (float(pct) / 100.0)

          # 2) backfill 마지막 index 읽기 (포맷: date,index,ret)
          lines = backfill_path.read_text(encoding="utf-8").strip().splitlines()
          if len(lines) < 2:
              print("[backfill] backfill has no data rows; skip")
              raise SystemExit(0)

          header = lines[0].strip()
          last_parts = lines[-1].strip().split(",")
          if len(last_parts) < 2:
              print("[backfill] malformed last row; skip")
              raise SystemExit(0)

          last_date = last_parts[0]
          last_index = float(last_parts[1])

          # 3) 같은 날짜면 덮어쓰기, 더 최신이면 갭필 후 append
          import datetime as _dt

          new_index = last_index * (1.0 + ret)
          new_line = f"{date},{new_index},{ret}"

          if date == last_date:
              lines[-1] = new_line
              action = "overwrite"
          elif date < last_date:
              print(f"[backfill] date {date} < last_date {last_date}; skip to avoid disorder")
              raise SystemExit(0)
          else:
              # 갭필: last_date ~ date 사이 빠진 날짜를 전일값으로 채우기
              last_dt = _dt.datetime.strptime(last_date, "%Y-%m-%d").date()
              today_dt = _dt.datetime.strptime(date, "%Y-%m-%d").date()
              gap_days = (today_dt - last_dt).days
              if gap_days > 1:
                  print(f"[backfill] Gap detected: {last_date} → {date} ({gap_days-1}일 누락), 전일값으로 채움")
                  fill_index = last_index
                  for i in range(1, gap_days):
                      fill_date = (last_dt + _dt.timedelta(days=i)).strftime("%Y-%m-%d")
                      fill_line = f"{fill_date},{fill_index},0.0"
                      lines.append(fill_line)
                      print(f"[backfill] gapfill OK: {fill_line}")
              lines.append(new_line)
              action = "append"

          backfill_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(f"[backfill] {action} OK: {new_line}")
          PY


      # 1.6) backfill 확정 후 bm20_series.json 재생성
      - name: Rebuild bm20_series.json from backfill
        shell: bash
        run: |
          set -euo pipefail
          python - << 'PY'
          import json
          from pathlib import Path

          BACKFILL = Path("out/backfill_current_basket.csv")
          SERIES_JSON = Path("bm20_series.json")
          LATEST_JSON = Path("bm20_latest.json")

          if not BACKFILL.exists():
              print("[WARN] backfill_current_basket.csv 없음 → skip")
              raise SystemExit(0)

          rows = []
          import csv
          with BACKFILL.open(encoding="utf-8") as f:
              reader = csv.DictReader(f)
              if reader.fieldnames and "date" in reader.fieldnames:
                  for row in reader:
                      d = row.get("date","").strip()[:10]
                      v = row.get("index") or row.get("level")
                      if d and v:
                          try:
                              rows.append({"date": d, "level": round(float(v), 6)})
                          except:
                              pass
              else:
                  f.seek(0)
                  for line in f:
                      parts = line.strip().split(",")
                      if len(parts) >= 2 and parts[0] != "date":
                          try:
                              rows.append({"date": parts[0], "level": round(float(parts[1]), 6)})
                          except:
                              pass

          if not rows:
              print("[WARN] backfill 데이터 없음 → skip")
              raise SystemExit(0)

          rows.sort(key=lambda x: x["date"])
          SERIES_JSON.write_text(json.dumps(rows, ensure_ascii=False, indent=2), encoding="utf-8")
          print(f"[OK] bm20_series.json → {len(rows)}개 ({rows[-1]['date']}, level={rows[-1]['level']})")

          # bm20_latest.json도 최신 레벨로 업데이트
          if LATEST_JSON.exists():
              latest = json.loads(LATEST_JSON.read_text(encoding="utf-8"))
              latest["bm20Level"] = rows[-1]["level"]
              LATEST_JSON.write_text(json.dumps(latest, ensure_ascii=False, indent=2), encoding="utf-8")
              print(f"[OK] bm20_latest.json bm20Level → {rows[-1]['level']}")
          PY

      # 1.7) backfill 확정 후 market_history.csv append
      - name: Append market history CSV
        shell: bash
        run: |
          set -euo pipefail
          python - << 'PY'
          import json, csv, os, requests, time
          from pathlib import Path
          from datetime import datetime, timezone, timedelta

          KST = timezone(timedelta(hours=9))
          YMD = datetime.now(KST).strftime("%Y-%m-%d")
          ROOT = Path("/home/runner/work/bm/bm")
          HIST_DIR = ROOT / "out" / "history"
          MARKET_HIST_CSV = HIST_DIR / "market_history.csv"
          BACKFILL = ROOT / "out" / "backfill_current_basket.csv"

          # backfill에서 오늘 레벨/수익률 읽기
          bm20_level = None
          bm20_chg_pct = None
          lines = BACKFILL.read_text(encoding="utf-8").strip().splitlines()
          for line in reversed(lines):
              parts = line.strip().split(",")
              if len(parts) >= 3 and parts[0] == YMD:
                  bm20_level = round(float(parts[1]), 4)
                  bm20_chg_pct = round(float(parts[2]) * 100, 4)
                  break

          # sentiment
          sentiment_value = None
          sentiment_label = None
          try:
              r = requests.get("https://api.alternative.me/fng/?limit=1&format=json", timeout=10)
              fng = r.json().get("data", [{}])[0]
              sentiment_value = int(fng.get("value", 0)) or None
              sentiment_label = fng.get("value_classification") or None
          except Exception as e:
              print(f"[WARN] FNG fetch failed: {e}")

          # kimchi
          kimchi_pct = None
          kp_path = ROOT / "out" / YMD / f"kimchi_{YMD}.json"
          if kp_path.exists():
              kp = json.loads(kp_path.read_text(encoding="utf-8"))
              kimchi_pct = round(float(kp.get("kimchi_pct", 0)), 4) if kp.get("kimchi_pct") is not None else None

          # usdkrw: Yahoo API 직접 호출 (kimchi 파일은 1450 fallback 가능성 있음)
          usdkrw = None
          try:
              _r = requests.get(
                  "https://query1.finance.yahoo.com/v8/finance/chart/USDKRW=X",
                  headers={"User-Agent": "Mozilla/5.0"},
                  params={"interval": "1d", "range": "2d"}, timeout=10)
              _r.raise_for_status()
              usdkrw = round(float(_r.json()["chart"]["result"][0]["meta"]["regularMarketPrice"]), 2)
              if not (900 <= usdkrw <= 2000):
                  raise ValueError(f"환율 이상값: {usdkrw}")
              print(f"[INFO] USDKRW={usdkrw} (Yahoo API)")
          except Exception as _e:
              print(f"[WARN] USDKRW fetch failed: {_e}")

          # k_share
          k_share_percent = None
          kxrp_path = ROOT / "out" / "global" / "k_xrp_share_24h_latest.json"
          if kxrp_path.exists():
              kxrp = json.loads(kxrp_path.read_text(encoding="utf-8"))
              k_share_percent = round(float(kxrp.get("k_share_pct", 0) or 0), 4) or None

          # btc_dominance
          btc_dominance = None
          try:
              api_key = os.environ.get("CMC_API_KEY", "")
              if api_key:
                  r2 = requests.get(
                      "https://pro-api.coinmarketcap.com/v1/global-metrics/quotes/latest",
                      headers={"X-CMC_PRO_API_KEY": api_key}, timeout=10)
                  btc_dominance = round(float(r2.json()["data"]["btc_dominance"]), 2)
          except Exception as e:
              print(f"[WARN] btc_dominance failed: {e}")

          COLUMNS = [
              "date", "bm20_level", "bm20_chg_pct",
              "sentiment_value", "sentiment_label",
              "kimchi_pct", "usdkrw", "k_share_percent",
              "btc_funding_bin", "eth_funding_bin",
              "btc_funding_byb", "eth_funding_byb",
              "btc_dominance",
          ]
          row = {
              "date": YMD, "bm20_level": bm20_level, "bm20_chg_pct": bm20_chg_pct,
              "sentiment_value": sentiment_value, "sentiment_label": sentiment_label,
              "kimchi_pct": kimchi_pct, "usdkrw": usdkrw, "k_share_percent": k_share_percent,
              "btc_funding_bin": None, "eth_funding_bin": None,
              "btc_funding_byb": None, "eth_funding_byb": None,
              "btc_dominance": btc_dominance,
          }

          if MARKET_HIST_CSV.exists():
              import pandas as pd
              df = pd.read_csv(MARKET_HIST_CSV, dtype={"date": str})
              for col in COLUMNS:
                  if col not in df.columns:
                      df[col] = None
              df = df[df["date"] != YMD]
              new_row = pd.DataFrame([row], columns=COLUMNS)
              df = pd.concat([df, new_row], ignore_index=True)
          else:
              import pandas as pd
              df = pd.DataFrame([row], columns=COLUMNS)

          df.to_csv(MARKET_HIST_CSV, index=False, encoding="utf-8")
          print(f"[OK] market_history.csv → {len(df)}행 (date={YMD}, bm20={bm20_level}, sentiment={sentiment_value}/{sentiment_label})")
          PY

      # 2) out → archive 복사 + archive html 생성(스크립트 내부에서 처리)
      - name: Generate site (latest + archive)
        shell: bash
        run: |
          python scripts/generate_report.py
          echo "" > .nojekyll

      # 2.5) latest 보강 — 특정 날짜 지정 가능 + 최신 archive 자동 선택 + 파일명/치환 정상화
      - name: Publish latest (fixed assets)
        shell: bash
        run: |
          set -euo pipefail

          # (1) 날짜 결정: 입력값 우선, 없으면 archive 최신 폴더
          TARGET_DATE="${{ inputs.target_date }}"
          if [ -n "${TARGET_DATE}" ]; then
            DATE="${TARGET_DATE}"
          else
            DATE=$(ls -1 archive 2>/dev/null | grep -E "^[0-9]{4}-[0-9]{2}-[0-9]{2}$" | sort | tail -n 1)
          fi

          if [ -z "${DATE:-}" ]; then
            echo "[WARN] No archive date found. Skip publish."
            exit 0
          fi

          SRC="archive/$DATE"
          echo "[DEBUG] Using archive date: $DATE"
          echo "[DEBUG] Checking $SRC"

          if [ ! -d "$SRC" ]; then
            echo "[WARN] $SRC not found. Skip publish."
            exit 0
          fi

          # (2) 필요한 파일 존재 확인 (※ 파일명 오타/구조 오류 수정)
          # - 날짜가 붙는 원본: bm20_trend_${DATE}.png
          for f in "bm20_daily_${DATE}.html" "bm20_bar_${DATE}.png" "bm20_trend_${DATE}.png"; do
            if [ ! -f "$SRC/$f" ]; then
              echo "[WARN] $SRC/$f not found. Skip publish."
              exit 0
            fi
          done

          # (3) HTML 안의 이미지 참조를 latest 파일로 치환 (캐시버스터 ?v=도 허용)
          # - bar -> bm20_bar_latest.png
          # - trend -> bm20_trend_latest.png
          sed -E \
            -e "s#bm20_bar_${DATE}\.png(\?v=[0-9]+)?#bm20_bar_latest.png#g" \
            -e "s#bm20_trend_${DATE}\.png(\?v=[0-9]+)?#bm20_trend_latest.png#g" \
            "$SRC/bm20_daily_${DATE}.html" > latest.html

          # (4) 고정 파일로 복사
          cp -f "$SRC/bm20_bar_${DATE}.png"   bm20_bar_latest.png
          cp -f "$SRC/bm20_trend_${DATE}.png" bm20_trend_latest.png

      # 3) 커밋 & 푸시
      - name: Commit & Push (rebased & autostash)
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 0) 혹시 모를 중복 실행/경합 대비: 원격 최신 확보
          git fetch origin main

          # 1) 중요 파일 먼저 백업
          cp out/backfill_current_basket.csv /tmp/backfill_backup.csv 2>/dev/null || true
          cp out/history/market_history.csv /tmp/market_history_backup.csv 2>/dev/null || true

          # 2) 생성된 변경사항을 먼저 스태시(추적안된 파일 포함)
          git stash push -u -m "bm20-autostash" || true

          # 3) 원격 main으로 깔끔하게 리베이스 동기화
          git pull --rebase origin main

          # 4) 스태시 복원
          git stash pop || true

          # 5) 백업에서 중요 파일 복원 (원격에 덮어써지는 것 방지)
          cp /tmp/backfill_backup.csv out/backfill_current_basket.csv 2>/dev/null || true
          cp /tmp/market_history_backup.csv out/history/market_history.csv 2>/dev/null || true
          git add out/backfill_current_basket.csv out/history/market_history.csv 2>/dev/null || true

          # 4) 커밋/푸시 (커밋 메시지는 실행 시각 기준 날짜로 유지)
          DATE=$(TZ=Asia/Seoul date +%F)
          git add -A

          if ! git diff --cached --quiet; then
            git commit -m "chore: auto daily report for ${DATE}"
          fi

          git push origin HEAD:main || {
            git fetch origin main
            git pull --rebase origin main
            git push origin HEAD:main
          }
