name: Send Letter (manual)
on:
  workflow_dispatch:
  # 자동 발송 재개 시 아래 주석 해제
  # workflow_run:
  #   workflows: ["Render Letter (daily)"]
  #   types:
  #     - completed
jobs:
  send:
    # 자동 발송 재개 시 아래 조건도 함께 해제
    # if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      STIBEE_API_KEY:    ${{ secrets.STIBEE_API_KEY }}
      STIBEE_LIST_ID:    ${{ secrets.STIBEE_LIST_ID }}
      STIBEE_FROM_EMAIL: ${{ secrets.STIBEE_FROM_EMAIL }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Check letter.html exists
        shell: bash
        run: |
          test -f letter.html
          echo "[OK] letter.html found ($(wc -c < letter.html) bytes)"
      - name: Send Newsletter via Stibee
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/send_newsletter.py
          echo "[OK] newsletter sent"
