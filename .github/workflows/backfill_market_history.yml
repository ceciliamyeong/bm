name: Backfill Market History (one-time)

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run backfill
        run: python scripts/backfill_market_history.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/history/market_history.csv
          if ! git diff --cached --quiet; then
            git commit -m "fix: market_history backfill 03-26~04-06 [manual]"
            git push origin main
          else
            echo "No changes to commit"
          fi
