name: Render Letter (daily)
on:
  workflow_dispatch:
  schedule:
    # 매일 06:30 KST (21:30 UTC 전날)
    - cron: "30 21 * * *"
permissions:
  contents: write
concurrency:
  group: render-letter-main
  cancel-in-progress: true
jobs:
  render:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests plotly kaleido yfinance
      - name: Update BM20 full data
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/update_bm20_full.py
          test -f out/global/k_xrp_share_24h_latest.json
          test -f data/bm20_history.json
          echo "[OK] bm20 full data updated"
      - name: Sanity check inputs
        shell: bash
        run: |
          set -euo pipefail
          MISSING=0
          check() {
            if test -f "$1"; then
              echo "[OK]      $1"
            else
              echo "[MISSING] $1"
              MISSING=$((MISSING+1))
            fi
          }
          check letter_newsletter_template.html
          check bm20_latest.json
          check bm20_daily_data_latest.csv
          check out/history/krw_24h_latest.json
          check data/bm20_history.json
          check out/global/k_xrp_share_24h_latest.json
          check data/etf_summary.json
          check nasdaq_series.json
          check kospi_series.json
          check out/history/krw_24h_snapshots.json
          if [ "$MISSING" -gt 0 ]; then
            echo "ERROR: $MISSING file(s) missing"
            exit 1
          fi
          echo "[OK] all inputs exist"
      - name: Update BTC series (from CSV)
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/update_btc_series.py
          test -f out/history/btc_usd_series.json
          echo "[OK] btc series updated"
      - name: Render Treemap PNG (from CSV)
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/render_treemap_png.py
          test -f assets/topcoins_treemap_latest.png
          echo "[OK] treemap png ready"

      - name: Fetch Top News from WP
        run: python scripts/fetch_top_news.py    
          
      - name: Render letter.html
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/render_letter.py
          test -f letter.html
          echo "[OK] rendered letter.html"
      - name: Commit & Push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add letter.html \
            out/history/btc_usd_series.json \
            out/history/krw_24h_latest.json \
            out/history/krw_24h_snapshots.json \
            out/global/k_xrp_share_24h_latest.json \
            data/bm20_history.json \
            data/etf_summary.json \
            nasdaq_series.json kospi_series.json \
            assets/topcoins_treemap_latest.png \
            bm20_latest.json bm20_daily_data_latest.csv || true
          if ! git diff --cached --quiet; then
            DATE=$(TZ=Asia/Seoul date +%F)
            git commit -m "chore: render letter + btc + treemap (${DATE})"
            git pull --rebase --autostash origin main
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
